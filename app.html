                        style={{width:72,padding:'4px 8px',border:'1.5px solid #C99A4A',borderRadius:7,fontSize:13,fontFamily:'inherit',outline:'none',background:'#FFFDF7'}}/>
                    : <span onClick={()=>setER(u.id)} style={{display:'inline-flex',alignItems:'center',gap:5,fontSize:13.5,fontWeight:700,color:'#23201C',cursor:'pointer'}}>
                        ${u.rate||0}
                        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="#C99A4A" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>
                      </span>
                ) : <span style={{color:'#cdbf9f',fontSize:13}}>—</span>}
              </div>
              {/* Password */}
              <div style={{paddingLeft:8}}>
                <span style={{display:'inline-flex',alignItems:'center',gap:5,fontSize:12,fontWeight:600,color:ps.c,background:ps.bg,border:`1px solid ${ps.bdr}`,padding:'3px 10px',borderRadius:20}}>
                  <span style={{width:6,height:6,borderRadius:'50%',background:ps.dot,flexShrink:0}}/>
                  {ps.label}
                </span>
              </div>
              {/* Last sign-in */}
              <div style={{paddingLeft:8,fontSize:12.5,color:'#7c7363'}}>{lastSignIn(u)}</div>
              {/* Actions */}
              <div style={{paddingLeft:8,display:'flex',alignItems:'center',gap:6}}>
                <button onClick={()=>openEdit(u)} style={{width:28,height:28,border:'1px solid #E4D9C0',background:'#FBF6EC',borderRadius:7,display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',flexShrink:0}}>
                  <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#9c7026" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>
                </button>
                {pwStatus(u)==='active'
                  ? <button style={{display:'flex',alignItems:'center',gap:5,padding:'5px 11px',background:'#FBF6EC',border:'1px solid #E4D9C0',borderRadius:7,fontFamily:'inherit',fontSize:12,fontWeight:600,color:'#5a5345',cursor:'pointer',flexShrink:0}}>
                      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M1 4v6h6"/><path d="M3.51 15a9 9 0 1 0 .49-3.5"/></svg>Reset
                    </button>
                  : <button onClick={()=>openEdit(u)} style={{display:'flex',alignItems:'center',gap:5,padding:'5px 11px',background:'#1C3A2E',border:'none',borderRadius:7,fontFamily:'inherit',fontSize:12,fontWeight:600,color:'#F1EBDB',cursor:'pointer',flexShrink:0,boxShadow:'0 2px 6px rgba(28,58,46,.2)'}}>
                      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>Set password
                    </button>
                }
              </div>
            </div>
          );
        })}
      </div></div>

      {/* Edit user modal */}
      <Modal open={!!editUser} onClose={()=>setEU(null)} title={editUser?`Edit — ${editUser.name}`:''}
        footer={<div style={{display:'flex',justifyContent:'space-between',width:'100%',alignItems:'center'}}>
          <button onClick={()=>removeUser(editUser)} style={{display:'flex',alignItems:'center',gap:6,padding:'8px 13px',background:'#FBEAE2',border:'1px solid #F0B8A0',color:'#B4502E',borderRadius:9,fontFamily:'inherit',fontSize:13,fontWeight:600,cursor:'pointer'}}>
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>Remove
          </button>
          <div style={{display:'flex',gap:9}}><Btn v="secondary" onClick={()=>setEU(null)}>Cancel</Btn><Btn onClick={saveEdit}>Save changes</Btn></div>
        </div>}>
        <div style={{display:'flex',flexDirection:'column',gap:13}}>
          <G2><Inp label="Full name" value={eF.name} onChange={v=>setEF(f=>({...f,name:v}))} req/><Inp label="Email" type="email" value={eF.email} onChange={v=>setEF(f=>({...f,email:v}))} req/></G2>
          <RolePicker value={eF.role||'boarder'} onChange={v=>setEF(f=>({...f,role:v}))}/>
          {hasRole({role:eF.role},'boarder')&&<Inp label="Monthly board rate ($)" type="number" value={String(eF.rate||'')} onChange={v=>setEF(f=>({...f,rate:v}))}/>}}
          {editUser&&editUser.id===db.getAuth()?.userId
            ?<Inp label="Set / reset password" value={eF.password} onChange={v=>setEF(f=>({...f,password:v}))} placeholder="Leave blank to keep current"/>
            :<div>
              <div style={{fontSize:11,fontWeight:700,color:'#9a9081',textTransform:'uppercase',letterSpacing:.5,marginBottom:6}}>Password</div>
              {pwResetSent
                ?<div style={{display:'flex',alignItems:'center',gap:8,padding:'9px 12px',background:'#EDF4F0',border:'1px solid #B8D9C2',borderRadius:9,fontSize:13,color:'#2f5a42',fontWeight:600}}>
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#3C7A57" strokeWidth="2.2" strokeLinecap="round"><path d="M20 6 9 17l-5-5"/></svg>
                  Reset email sent to {editUser?.email}
                </div>
                :<button onClick={()=>{if(editUser?.email&&window.DB_SYNC){const sb=window.supabase?.createClient('https://vihmrjonkeiuzjzuzzsj.supabase.co','eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZpaG1yam9ua2VpdXpqenV6enNqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIwMTAyOTMsImV4cCI6MjA5NzU4NjI5M30.hIbnMUQPd3W8owt0VjQIzwOkiS74ZWbJez0DbIAsYTs');sb?.auth.resetPasswordForEmail(editUser.email,{redirectTo:window.location.origin+'/app.html'}).then(()=>setPwResetSent(true));}}} style={{display:'flex',alignItems:'center',gap:7,padding:'9px 14px',background:'#1C3A2E',color:'#F1EBDB',border:'none',borderRadius:9,fontFamily:'inherit',fontSize:13,fontWeight:600,cursor:'pointer'}}>
                  <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                  Send password reset email
                </button>
              }
            </div>
          }
        </div>
      </Modal>

      {/* Invite modal */}
      <Modal open={inviteOpen} onClose={()=>setInvite(false)} title="Invite user"
        footer={<><Btn v="secondary" onClick={()=>setInvite(false)}>Cancel</Btn><Btn onClick={saveInvite} disabled={!iF.name||!iF.email}>Send invite</Btn></>}>
        <div style={{display:'flex',flexDirection:'column',gap:13}}>
          <G2><Inp label="Full name" value={iF.name} onChange={v=>setIF(f=>({...f,name:v}))} placeholder="Jane Smith" req/><Inp label="Email" type="email" value={iF.email} onChange={v=>setIF(f=>({...f,email:v}))} placeholder="jane@email.com" req/></G2>
          <RolePicker value={iF.role||'boarder'} onChange={v=>setIF(f=>({...f,role:v}))}/>
          <Inp label="Temporary password" value={iF.password} onChange={v=>setIF(f=>({...f,password:v}))}/>
        </div>
      </Modal>
    </div>
  );
}

/* ─── App Shell ─── */
const NAV=[

function AppShell({auth,onLogout}){
  const [page,setPage]=React.useState(()=>sessionStorage.getItem('sos_page')||'dashboard');
  const [bdg,setBdg]=React.useState({});
  const [isMobile,setIsMobile]=React.useState(()=>window.innerWidth<768);
  const [moreOpen,setMoreOpen]=React.useState(false);
  const barn=db.getBarn();
  React.useEffect(()=>{const h=()=>setIsMobile(window.innerWidth<768);window.addEventListener('resize',h);return()=>window.removeEventListener('resize',h);},[]);
  React.useEffect(()=>{document.body.classList.toggle('mob',isMobile);},[isMobile]);
  const go=p=>{setPage(p);sessionStorage.setItem('sos_page',p);setMoreOpen(false);};
  React.useEffect(()=>{
    setBdg({horses:db.getHorses({status:'active'}).length,tasks:db.getTasks({done:false}).length,health:db.getDueRecords().filter(r=>r._days<=14).length,messages:db.unreadCount(),billing:db.getInvoices({status:'overdue'}).length});
  },[page]);
  const TITLES={dashboard:'Dashboard',horses:'Horses',feeding:'Feeding Board',health:'Health Records',calendar:'Arena Calendar',tasks:'Daily Tasks',billing:'Billing',boarders:'Boarders',messages:'Messages',reports:'Reports',settings:'Users & Access'};
  const BOT_NAV=[
    {id:'dashboard',label:'Home',d:'M3 10.5 12 3l9 7.5M5 9.5V21h14V9.5M9.5 21v-6h5v6'},
    {id:'horses',   label:'Horses',d:'M5 21V9l4-3 3 2.5h3a3 3 0 0 1 3 3V21M5 13h6M9 21v-5'},
    {id:'feeding',  label:'Feed',d:'M5 8h14l-1.4 11.2a2 2 0 0 1-2 1.8H8.4a2 2 0 0 1-2-1.8ZM5 8l1-3.5h12L19 8'},
    {id:'tasks',    label:'Tasks',d:'M9 11l2 2 4-4M3.5 4.5h17a1 1 0 0 1 1 1v15a1 1 0 0 1-1 1h-17a1 1 0 0 1-1-1v-15a1 1 0 0 1 1-1M8 3v3M16 3v3'},
    {id:'messages', label:'Chat',d:'M4 5h16a1 1 0 0 1 1 1v10a1 1 0 0 1-1 1H9l-4 4V6a1 1 0 0 1 1-1Z'},
  ];
  const BOT_IDS=BOT_NAV.map(n=>n.id);
  const MORE_NAV=NAV.filter(n=>!BOT_IDS.includes(n.id));
  return <div style={{display:'flex',height:'100vh',overflow:'hidden'}}>
    {!isMobile&&<aside style={{width:232,flexShrink:0,background:'linear-gradient(180deg,#1C3A2E,#15291F)',color:'#E9E2D0',display:'flex',flexDirection:'column',overflow:'hidden'}}>
      <div style={{padding:'18px 16px 14px',borderBottom:'1px solid rgba(255,255,255,.07)',flexShrink:0}}>
        <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:10}}>
          <div style={{width:36,height:36,borderRadius:10,background:'linear-gradient(150deg,#C99A4A,#9c7026)',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#1C3A2E" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M5 21V8l4-3 4 3v3h3a3 3 0 0 1 3 3v7"/><path d="M5 14h6"/><path d="M9 21v-4"/></svg>
          </div>
          <div>
            <div style={{fontFamily:'Spectral,serif',fontWeight:700,fontSize:14,lineHeight:1,color:'#E9E2D0'}}>{barn.name}</div>
            <div style={{fontSize:10,color:'#9DBCA8',letterSpacing:1.1,textTransform:'uppercase',marginTop:3,fontWeight:600}}>{barn.location}</div>
          </div>
        </div>
        <div style={{background:'rgba(201,154,74,.1)',border:'1px solid rgba(201,154,74,.18)',borderRadius:9,padding:'8px 11px',display:'flex',alignItems:'center',gap:8}}>
          <UA name={auth.name} sz={26}/><div style={{minWidth:0}}><div style={{fontSize:12.5,fontWeight:600,color:'#E9E2D0',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{auth.name}</div><div style={{fontSize:10.5,color:'#9DBCA8',textTransform:'capitalize'}}>{auth.role}</div></div>
        </div>
      </div>
      <nav style={{flex:1,overflowY:'auto',padding:'10px 8px'}}>
        {NAV.map(({id,label,d})=>{const active=page===id;const badge=bdg[id];return <button key={id} onClick={()=>go(id)} style={{display:'flex',alignItems:'center',gap:10,width:'100%',border:'none',cursor:'pointer',borderRadius:9,padding:'9px 11px',fontFamily:"'Hanken Grotesk',sans-serif",fontSize:13,fontWeight:active?600:500,background:active?'rgba(201,154,74,.15)':'transparent',color:active?'#F3E7CB':'#BBD0C2',boxShadow:active?'inset 3px 0 0 #C99A4A':'none',transition:'background .12s',textAlign:'left',marginBottom:2}}>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.9" strokeLinecap="round" strokeLinejoin="round" style={{flexShrink:0,opacity:active?1:.7}}><path d={d}/></svg>
          <span style={{flex:1}}>{label}</span>
          {badge>0&&<span style={{background:['billing','health'].includes(id)?'#B4502E':'rgba(255,255,255,.12)',color:'#fff',fontSize:10,fontWeight:700,minWidth:18,height:18,padding:'0 4px',borderRadius:9,display:'flex',alignItems:'center',justifyContent:'center'}}>{badge}</span>}
        </button>;})}
      </nav>
      <div style={{padding:'11px 14px',borderTop:'1px solid rgba(255,255,255,.07)',flexShrink:0}}>
        <button onClick={onLogout} style={{fontSize:12.5,color:'#9DBCA8',background:'rgba(255,255,255,.06)',border:'none',borderRadius:8,padding:'7px 12px',cursor:'pointer',fontFamily:"'Hanken Grotesk',sans-serif",fontWeight:600,width:'100%',textAlign:'left'}}>← Sign out</button>
      </div>
    </aside>}
    <div style={{flex:1,minWidth:0,display:'flex',flexDirection:'column'}}>
      <header style={{height:isMobile?54:63,flexShrink:0,background:'rgba(247,242,231,.92)',backdropFilter:'blur(8px)',borderBottom:'1px solid #E0D5BC',display:'flex',alignItems:'center',padding:'0 26px'}}>
        <div><div style={{fontFamily:'Spectral,serif',fontSize:21,fontWeight:600,color:'#23201C'}}>{TITLES[page]}</div><div style={{fontSize:11.5,color:'#8A8170',marginTop:1}}>{barn.name} · {fD(TODAY)}</div></div>
      </header>
      <main style={{flex:1,overflow:page==='messages'?'hidden':'auto',WebkitOverflowScrolling:'touch',padding:page==='messages'?(isMobile?'0':'18px 22px'):(isMobile?'14px 14px 72px':'24px 26px 56px'),display:page==='messages'?'flex':'block',flexDirection:'column'}}>
        <div style={{maxWidth:page==='messages'?'none':1240,margin:'0 auto',flex:page==='messages'?1:undefined,minHeight:0,display:page==='messages'?'flex':'block',flexDirection:'column'}}>
          {page==='dashboard'&&<Dashboard auth={auth} go={go}/>}
          {page==='horses'&&<Horses/>}
          {page==='feeding'&&<FeedingBoard auth={auth}/>}
          {page==='health'&&<HealthRecords/>}
          {page==='calendar'&&<ArenaCalendar/>}
          {page==='tasks'&&<DailyTasks/>}
          {page==='billing'&&<Billing/>}
          {page==='boarders'&&<Boarders/>}
          {page==='messages'&&<Messages/>}
          {page==='reports'&&<Reports/>}
          {page==='settings'&&<Settings/>}
        </div>
      </main>
      {/* ── Mobile bottom nav ── */}
      {isMobile&&<>
        <nav style={{position:'fixed',bottom:0,left:0,right:0,height:60,background:'linear-gradient(180deg,#1C3A2E,#15291F)',display:'flex',zIndex:200,borderTop:'1px solid rgba(255,255,255,.09)',boxShadow:'0 -4px 20px rgba(0,0,0,.18)'}}>
          {BOT_NAV.map(({id,label,d})=>{const active=page===id;const badge=bdg[id];return <button key={id} onClick={()=>go(id)} style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:3,border:'none',background:'transparent',color:active?'#F3E7CB':'#9DBCA8',cursor:'pointer',position:'relative',padding:'6px 0',transition:'color .12s'}}>
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={active?2.1:1.6} strokeLinecap="round" strokeLinejoin="round"><path d={d}/></svg>
            <span style={{fontSize:9.5,fontWeight:active?700:500,letterSpacing:.2,fontFamily:"'Hanken Grotesk',sans-serif"}}>{label}</span>
            {badge>0&&<span style={{position:'absolute',top:4,right:'50%',transform:'translateX(13px)',background:['billing','health'].includes(id)?'#B4502E':'#C99A4A',color:'#fff',fontSize:9,fontWeight:700,minWidth:15,height:15,padding:'0 3px',borderRadius:8,display:'flex',alignItems:'center',justifyContent:'center'}}>{badge}</span>}
          </button>;})}
          <button onClick={()=>setMoreOpen(m=>!m)} style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:3,border:'none',background:moreOpen?'rgba(201,154,74,.15)':'transparent',color:moreOpen?'#F3E7CB':'#9DBCA8',cursor:'pointer',padding:'6px 0'}}>
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.7" strokeLinecap="round" strokeLinejoin="round"><circle cx="5" cy="12" r="1.5"/><circle cx="12" cy="12" r="1.5"/><circle cx="19" cy="12" r="1.5"/></svg>
            <span style={{fontSize:9.5,fontWeight:500,fontFamily:"'Hanken Grotesk',sans-serif"}}>More</span>
          </button>
        </nav>
        {moreOpen&&<>
          <div style={{position:'fixed',inset:0,zIndex:198}} onClick={()=>setMoreOpen(false)}/>
          <div style={{position:'fixed',bottom:60,left:0,right:0,background:'linear-gradient(180deg,#243d2f,#1C3A2E)',zIndex:199,borderTop:'1px solid rgba(255,255,255,.09)',boxShadow:'0 -8px 32px rgba(0,0,0,.25)',animation:'slideUp .15s ease'}}>
            <div style={{padding:'14px 16px 10px',borderBottom:'1px solid rgba(255,255,255,.07)',display:'flex',alignItems:'center',gap:10}}>
              <UA name={auth.name} sz={38}/>
              <div style={{flex:1,minWidth:0}}><div style={{fontSize:14,fontWeight:600,color:'#E9E2D0',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{auth.name}</div><div style={{fontSize:11,color:'#9DBCA8',textTransform:'capitalize'}}>{auth.role} · {barn.name}</div></div>
            </div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',padding:'8px 8px 4px'}}>
              {MORE_NAV.map(({id,label,d})=>{const active=page===id;const badge=bdg[id];return <button key={id} onClick={()=>go(id)} style={{display:'flex',alignItems:'center',gap:10,padding:'11px 12px',border:'none',background:active?'rgba(201,154,74,.15)':'transparent',color:active?'#F3E7CB':'#BBD0C2',cursor:'pointer',borderRadius:9,fontFamily:"'Hanken Grotesk',sans-serif",fontSize:13,fontWeight:active?600:500,textAlign:'left'}}>
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><path d={d}/></svg>
                <span style={{flex:1}}>{label}</span>
                {badge>0&&<span style={{background:'#B4502E',color:'#fff',fontSize:10,fontWeight:700,minWidth:18,height:18,padding:'0 4px',borderRadius:9,display:'flex',alignItems:'center',justifyContent:'center'}}>{badge}</span>}
              </button>;})}
            </div>
            <div style={{padding:'4px 14px 14px'}}>
              <button onClick={onLogout} style={{fontSize:13,color:'#9DBCA8',background:'rgba(255,255,255,.06)',border:'none',borderRadius:9,padding:'9px 16px',cursor:'pointer',fontFamily:"'Hanken Grotesk',sans-serif",fontWeight:600,width:'100%',textAlign:'left'}}>← Sign out</button>
            </div>
          </div>
        </>}
      </>}
    </div>
  </div>;
}

/* ─── Root ─── */
function App(){
  const [auth,setAuth]=React.useState(()=>{
    const tok=sessionStorage.getItem('stableos_token');
    if(tok)sessionStorage.removeItem('stableos_token');
    return db.getAuth();
  });
  const [shellKey,setShellKey]=React.useState(0);
  // Called by db.sync.js after Supabase data lands in localStorage
  React.useEffect(()=>{
    const reload = ()=>setShellKey(k=>k+1);
    window.__reloadDashboard = reload;
    window.addEventListener('db-sync-refresh', reload);
    return ()=>{delete window.__reloadDashboard; window.removeEventListener('db-sync-refresh', reload);};
  },[]);
  if(!auth)return <LoginScreen onLogin={setAuth}/>;
  return <AppShell key={shellKey} auth={auth} onLogout={()=>{db.logout();setAuth(null);}}/>;
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
