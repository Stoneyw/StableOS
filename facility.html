<!-- @dsCard group="StableOS" viewport="1440x900" name="Facility Map" subtitle="Stall occupancy, paddock grid, and property overview by section" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>StableOS — Facility Map</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Spectral:ital,wght@0,400;0,600;0,700;1,400&family=Hanken+Grotesk:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:'Hanken Grotesk',system-ui,sans-serif;background:#EBE2CF;-webkit-font-smoothing:antialiased;height:100vh;overflow:hidden}a{text-decoration:none;color:inherit}::-webkit-scrollbar{width:9px}::-webkit-scrollbar-thumb{background:#cdbf9f;border-radius:8px;border:2.5px solid transparent;background-clip:content-box}</style>
</head>
<body><div id="root" style="height:100vh"></div>
<script type="text/babel">
const COAT={Bay:'linear-gradient(150deg,#6e4524,#39230f)',Chestnut:'linear-gradient(150deg,#9d5527,#67311a)',Sorrel:'linear-gradient(150deg,#a85f30,#79401e)',Palomino:'linear-gradient(150deg,#e2c07c,#bb8d40)',Grey:'linear-gradient(150deg,#c7bfb1,#8e857a)',Black:'linear-gradient(150deg,#3b332c,#181410)',Buckskin:'linear-gradient(150deg,#cfa563,#8c6c3a)'};

const STALLS=[
  {n:'1',horse:'Jig',    coat:'Bay',     owner:'Chris & Eileen'},
  {n:'2',horse:null},
  {n:'3',horse:'Diamond',coat:'Chestnut',owner:'Charlie'},
  {n:'4',horse:'Rohze',  coat:'Bay',     owner:'Chris & Eileen'},
  {n:'5',horse:'Tess',   coat:'Sorrel',  owner:'Chris & Eileen'},
  {n:'6',horse:null},
  {n:'7',horse:'Remy',   coat:'Grey',    owner:'Barn horse'},
  {n:'8',horse:'Ruby',   coat:'Palomino',owner:'Charlie'},
];

const PADDOCKS_W=[
  {n:'W1', horse:'Georgia',        coat:'Bay',     owner:'Emily'},
  {n:'W2', horse:null},
  {n:'W3a',horse:'Sophie',         coat:'Chestnut',owner:'Christy'},
  {n:'W3b',horse:'Alvin',          coat:'Sorrel',  owner:'Christy', shared:true},
  {n:'W4', horse:'Foxy',           coat:'Palomino',owner:'Stephanie'},
  {n:'W5', horse:null},
  {n:'W6', horse:'Rio',            coat:'Bay',     owner:'Laine'},
  {n:'W7a',horse:'Pretzel',        coat:'Grey',    owner:'Laurel'},
  {n:'W7b',horse:'Amali',          coat:'Black',   owner:'Laurel', shared:true},
  {n:'W8', horse:'Journey',        coat:'Buckskin',owner:'Maddie'},
  {n:'W9', horse:'Santana',        coat:'Chestnut',owner:'Mani'},
  {n:'W10',horse:'Malibu',         coat:'Palomino',owner:'Bri'},
  {n:'W11',horse:null},
  {n:'W12a',horse:'Lena',          coat:'Bay',     owner:'Chris & Eileen'},
  {n:'W12b',horse:'Whiskey',       coat:'Sorrel',  owner:'Chris & Eileen', shared:true},
  {n:'W13',horse:null},
];
const PADDOCKS_E=[
  {n:'E14',horse:null},
  {n:'E15',horse:null},
];

const NAV=[{href:'app.html',id:'dashboard',label:'Dashboard'},{href:'app.html',id:'horses',label:'Horses'},{href:'boarders.html',id:'boarders',label:'Boarders'},{href:'app.html',id:'feeding',label:'Feeding Board'},{href:'tasks.html',id:'tasks',label:'Daily Tasks',badge:'6'},{href:'medical.html',id:'medical',label:'Medical Records'},{href:'calendar.html',id:'calendar',label:'Arena Calendar'},{href:'facility.html',id:'facility',label:'Facility Map',active:true},{href:'messages.html',id:'messages',label:'Messages',badge:'2'},{href:'billing.html',id:'billing',label:'Billing'},{href:'reports.html',id:'reports',label:'Reports'}];
const ICONS={dashboard:'<path d="M3 10.5 12 3l9 7.5"/><path d="M5 9.5V21h14V9.5"/><path d="M9.5 21v-6h5v6"/>',horses:'<path d="M5 21V9l4-3 3 2.5h3a3 3 0 0 1 3 3V21"/><path d="M5 13h6"/>',boarders:'<circle cx="9" cy="8" r="3.2"/><path d="M3.5 20a5.5 5.5 0 0 1 11 0"/>',feeding:'<path d="M5 8h14l-1.4 11.2a2 2 0 0 1-2 1.8H8.4a2 2 0 0 1-2-1.8Z"/>',tasks:'<path d="M9 11l2 2 4-4"/><rect x="3.5" y="4.5" width="17" height="16" rx="3"/>',medical:'<path d="M3 12h4l2-5 3 10 2-7 2 2h5"/>',calendar:'<rect x="3.5" y="5" width="17" height="15.5" rx="3"/>',facility:'<path d="m9 4 6 2 5-2v14l-5 2-6-2-5 2V6Z"/><path d="M9 4v14M15 6v14"/>',messages:'<path d="M4 5h16a1 1 0 0 1 1 1v10a1 1 0 0 1-1 1H9l-4 4V6a1 1 0 0 1 1-1Z"/>',billing:'<rect x="2" y="5" width="20" height="14" rx="2"/><path d="M2 10h20"/>',reports:'<path d="M3 12h4l2-5 3 10 2-7 2 2h5"/>'};

function Sidebar(){return(<aside style={{width:248,flexShrink:0,background:'linear-gradient(180deg,#1C3A2E,#15291F)',color:'#E9E2D0',display:'flex',flexDirection:'column'}}><div style={{padding:'20px 18px 14px',display:'flex',alignItems:'center',gap:11,borderBottom:'1px solid rgba(255,255,255,.07)'}}><div style={{width:38,height:38,borderRadius:10,background:'linear-gradient(150deg,#C99A4A,#9c7026)',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#1C3A2E" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M5 21V8l4-3 4 3v3h3a3 3 0 0 1 3 3v7"/><path d="M5 14h6"/><path d="M9 21v-4"/></svg></div><div><div style={{fontFamily:'Spectral,serif',fontWeight:700,fontSize:15,lineHeight:1}}>The Winners Stable</div><div style={{fontSize:10.5,color:'#9DBCA8',letterSpacing:1.3,textTransform:'uppercase',marginTop:4}}>Georgetown, TX</div></div></div><nav style={{flex:1,overflowY:'auto',padding:'14px 10px',display:'flex',flexDirection:'column',gap:3}}>{NAV.map(n=><a key={n.id} href={n.href} style={{display:'flex',alignItems:'center',gap:11,borderRadius:10,padding:'10px 12px',fontSize:13.5,fontWeight:n.active?600:500,background:n.active?'rgba(201,154,74,.16)':'transparent',color:n.active?'#F3E7CB':'#BBD0C2',boxShadow:n.active?'inset 3px 0 0 #C99A4A':'none',textDecoration:'none',transition:'.15s'}}><span style={{width:20,height:20,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}><svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" dangerouslySetInnerHTML={{__html:ICONS[n.id]||''}}/></span><span style={{flex:1}}>{n.label}</span>{n.badge&&<span style={{background:'#B4502E',color:'#fff',fontSize:10.5,fontWeight:700,minWidth:18,height:18,padding:'0 5px',borderRadius:9,display:'flex',alignItems:'center',justifyContent:'center'}}>{n.badge}</span>}</a>)}</nav><div style={{padding:'12px 14px',borderTop:'1px solid rgba(255,255,255,.07)',display:'flex',alignItems:'center',gap:10}}><div style={{width:36,height:36,borderRadius:'50%',background:'linear-gradient(150deg,#3C7A57,#2a5b3e)',display:'flex',alignItems:'center',justifyContent:'center',fontWeight:700,fontSize:13,color:'#fff',flexShrink:0}}>CE</div><div style={{flex:1,minWidth:0}}><div style={{fontSize:13.5,fontWeight:600}}>Chris & Eileen</div><div style={{fontSize:11.5,color:'#9DBCA8'}}>Manager</div></div></div></aside>);}

function SlotCard({ n, horse, coat, owner, shared }) {
  const occupied = !!horse;
  return (
    <div style={{display:'flex',alignItems:'center',gap:9,padding:'10px 12px',border:`1px solid ${occupied?'#E8DFCC':'#EFE6D0'}`,borderRadius:12,background:occupied?'#fff':'#FAFAF6',cursor:occupied?'pointer':'default',transition:'.15s'}}>
      <div style={{width:30,height:30,borderRadius:8,background:occupied?(COAT[coat]||COAT.Bay):'#EDE5D2',flexShrink:0,display:'flex',alignItems:'center',justifyContent:'center',fontFamily:'Spectral,serif',fontSize:13,color:'rgba(255,255,255,.55)',fontWeight:600}}>
        {occupied ? horse[0] : ''}
      </div>
      <div style={{minWidth:0}}>
        <div style={{fontSize:9.5,color:'#9a9081',textTransform:'uppercase',letterSpacing:.5}}>{n}</div>
        <div style={{fontSize:12.5,fontWeight:occupied?600:400,color:occupied?'#2f2a23':'#9a9081',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{horse||'Empty'}</div>
        {occupied&&owner&&<div style={{fontSize:10.5,color:'#9a9081',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{owner}</div>}
      </div>
      {shared&&<span style={{fontSize:9,fontWeight:700,color:'#9c7026',background:'#F6ECD2',padding:'1px 6px',borderRadius:20,flexShrink:0}}>Shared</span>}
    </div>
  );
}

function App() {
  const stallsFilled = STALLS.filter(s=>s.horse).length;
  const paddocksFilled = [...PADDOCKS_W,...PADDOCKS_E].filter(p=>p.horse&&!p.shared).length;

  return (
    <div style={{display:'flex',height:'100vh',overflow:'hidden',background:'#EBE2CF'}}>
      <Sidebar/>
      <div style={{flex:1,minWidth:0,display:'flex',flexDirection:'column'}}>
        <header style={{height:68,flexShrink:0,background:'rgba(247,242,231,.88)',backdropFilter:'blur(8px)',borderBottom:'1px solid #E0D5BC',display:'flex',alignItems:'center',gap:16,padding:'0 26px'}}>
          <div style={{flex:1}}><div style={{fontFamily:'Spectral,serif',fontSize:22,fontWeight:600,color:'#23201C'}}>Facility Map</div><div style={{fontSize:12,color:'#8A8170',marginTop:2}}>The Winners Stable · Georgetown, TX</div></div>
          <div style={{display:'flex',gap:14,flexWrap:'wrap',fontSize:12,color:'#7c7363',fontWeight:600}}>
            {[['#C99A4A','Paddocks 1–15'],['#2A2521','Barn stalls'],['#B4502E','Round pens'],['#3C7A57','Entry gates']].map(([c,l])=>(
              <span key={l} style={{display:'flex',alignItems:'center',gap:6}}><span style={{width:11,height:11,borderRadius:3,background:c}}/>{l}</span>
            ))}
          </div>
        </header>

        <main style={{flex:1,overflowY:'auto',padding:'20px 26px 48px'}}>
          <div style={{maxWidth:1180,margin:'0 auto',display:'flex',flexDirection:'column',gap:18}}>

            {/* Summary strip */}
            <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:14}}>
              {[
                ['Barn stalls',`${stallsFilled}/8`,'Occupied','#9c7026'],
                ['Paddocks',`${paddocksFilled}/15`,'Occupied','#C99A4A'],
                ['Total horses','18','Across all areas','#23201C'],
                ['Available','5','Open stalls & paddocks','#3C7A57'],
              ].map(([l,v,s,c])=>(
                <div key={l} style={{background:'#fff',border:'1px solid #E8DFCC',borderRadius:14,padding:'14px 17px',boxShadow:'0 1px 2px rgba(40,30,15,.04)'}}>
                  <div style={{fontSize:11.5,fontWeight:600,color:'#8A8170',marginBottom:6}}>{l}</div>
                  <div style={{fontFamily:'Spectral,serif',fontSize:26,fontWeight:700,color:c,lineHeight:1}}>{v}</div>
                  <div style={{fontSize:11.5,color:'#8A8170',marginTop:4}}>{s}</div>
                </div>
              ))}
            </div>

            <div style={{display:'grid',gridTemplateColumns:'1fr 1.6fr',gap:18,alignItems:'start'}}>
              {/* STALLS */}
              <div style={{display:'flex',flexDirection:'column',gap:14}}>
                <div style={{background:'#fff',border:'1px solid #E8DFCC',borderRadius:16,padding:'18px 20px',boxShadow:'0 1px 2px rgba(40,30,15,.04)'}}>
                  <div style={{display:'flex',alignItems:'center',gap:9,marginBottom:14}}>
                    <span style={{width:11,height:11,borderRadius:3,background:'#2A2521'}}/>
                    <div style={{fontFamily:'Spectral,serif',fontSize:17,fontWeight:600,color:'#23201C',flex:1}}>Barn stalls</div>
                    <span style={{fontSize:11.5,fontWeight:700,color:'#3C7A57',background:'#E5F0E7',border:'1px solid #c4dcc9',padding:'3px 10px',borderRadius:20}}>{stallsFilled}/8</span>
                  </div>
                  <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:9}}>
                    {STALLS.map(s=><SlotCard key={s.n} n={`Stall ${s.n}`} horse={s.horse} coat={s.coat} owner={s.owner}/>)}
                  </div>
                  <div style={{marginTop:14,display:'grid',gridTemplateColumns:'1fr 1fr',gap:9}}>
                    {[['#B4502E','Round Pen 1','Training'],['#B4502E','Round Pen 2','Training']].map(([c,l,v])=>(
                      <div key={l} style={{background:'#FBF6EC',border:'1px solid #EFE6D0',borderRadius:11,padding:'10px 13px'}}>
                        <div style={{display:'flex',alignItems:'center',gap:7,fontSize:10,color:'#9a9081',textTransform:'uppercase',letterSpacing:.5,marginBottom:3}}><span style={{width:8,height:8,borderRadius:'50%',background:c}}/>{l}</div>
                        <div style={{fontSize:12.5,fontWeight:600,color:'#5a5345'}}>{v}</div>
                      </div>
                    ))}
                  </div>
                  <div style={{marginTop:9,background:'#F2F5EE',border:'1px solid #DDE7D5',borderRadius:11,padding:'11px 13px',display:'flex',alignItems:'center',gap:9}}>
                    <span style={{fontSize:17}}>🐄</span>
                    <div><div style={{fontSize:13,fontWeight:600,color:'#2f2a23'}}>Cattle pasture</div><div style={{fontSize:11.5,color:'#8A8170'}}>North of the round pens</div></div>
                  </div>
                </div>
              </div>

              {/* PADDOCKS */}
              <div style={{background:'#fff',border:'1px solid #E8DFCC',borderRadius:16,padding:'18px 20px',boxShadow:'0 1px 2px rgba(40,30,15,.04)'}}>
                <div style={{display:'flex',alignItems:'center',gap:9,marginBottom:6}}>
                  <span style={{width:11,height:11,borderRadius:3,background:'#C99A4A'}}/>
                  <div style={{fontFamily:'Spectral,serif',fontSize:17,fontWeight:600,color:'#23201C',flex:1}}>Paddocks</div>
                  <span style={{fontSize:11.5,fontWeight:700,color:'#9c7026',background:'#F6ECD2',border:'1px solid #e6d3a4',padding:'3px 10px',borderRadius:20}}>{paddocksFilled}/15</span>
                </div>

                <div style={{fontSize:10,fontWeight:700,color:'#9a9081',textTransform:'uppercase',letterSpacing:.6,margin:'12px 0 8px'}}>West end · Paddocks 1–13</div>
                <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:8,marginBottom:16}}>
                  {PADDOCKS_W.filter(p=>!p.shared).map(p=><SlotCard key={p.n} n={`Paddock ${p.n}`} horse={p.horse} coat={p.coat} owner={p.owner} shared={PADDOCKS_W.some(q=>q.shared&&q.owner===p.owner&&p.horse)}/>)}
                </div>

                <div style={{fontSize:10,fontWeight:700,color:'#9a9081',textTransform:'uppercase',letterSpacing:.6,margin:'0 0 8px'}}>East end · Paddocks 14–15</div>
                <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:8}}>
                  {PADDOCKS_E.map(p=><SlotCard key={p.n} n={`Paddock ${p.n}`} horse={p.horse} coat={p.coat} owner={p.owner}/>)}
                  <div style={{padding:'10px 12px',border:'2px dashed #E8DFCC',borderRadius:12,display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer'}}>
                    <div style={{fontSize:12,color:'#9a9081',fontWeight:600,textAlign:'center'}}>+ Add boarder</div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </main>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
