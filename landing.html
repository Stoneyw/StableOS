      <section style={{background:'#fff',padding:'88px 40px'}}>
        <div style={{maxWidth:1240,margin:'0 auto',display:'grid',gridTemplateColumns:'1fr 1fr',gap:72,alignItems:'center'}}>
          {/* Feed board preview */}
          <div style={{background:'#EBE2CF',borderRadius:20,padding:24,boxShadow:'0 20px 48px rgba(40,30,15,.12)'}}>
            <div style={{background:'#fff',border:'1px solid #E8DFCC',borderRadius:14,overflow:'hidden',boxShadow:'0 1px 2px rgba(40,30,15,.04)'}}>
              <div style={{display:'grid',gridTemplateColumns:'36px 1.4fr 2fr 2fr 36px',gap:10,padding:'11px 16px',background:'#FBF6EC',borderBottom:'1px solid #EFE6D0',fontSize:10,fontWeight:700,color:'#9a9081',textTransform:'uppercase',letterSpacing:.6}}>
                <div>☀</div><div>Horse</div><div>Morning ration</div><div>Evening ration</div><div style={{textAlign:'center'}}>☾</div>
              </div>
              {[['Georgia','Bay','½ scoop pellets + 1 flake',true,true],['Sophie','Chestnut','1 cup Thrive DRY + 2 flake',true,true],['Foxy','Palomino','½ cup Ration Balancer',true,false],['Rio','Bay','1 scoop senior + 2 flake',false,false],['Pretzel','Grey','½ scoop + hay ad lib',false,false]].map(([h,c,r,am,pm])=>(
                <div key={h} style={{display:'grid',gridTemplateColumns:'36px 1.4fr 2fr 2fr 36px',gap:10,padding:'11px 16px',borderBottom:'1px solid #F4EEDE',alignItems:'center'}}>
                  <div style={{display:'flex',justifyContent:'center'}}>
                    <div style={{width:20,height:20,borderRadius:6,border:`2px solid ${am?'var(--gold-dark)':'#cfc3a8'}`,background:am?'var(--gold-dark)':'#fff',display:'flex',alignItems:'center',justifyContent:'center'}}>
                      {am&&<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth="3.2" strokeLinecap="round"><path d="M20 6 9 17l-5-5"/></svg>}
                    </div>
                  </div>
                  <div style={{display:'flex',alignItems:'center',gap:9}}>
                    <div style={{width:28,height:28,borderRadius:8,background:{Bay:'linear-gradient(150deg,#6e4524,#39230f)',Chestnut:'linear-gradient(150deg,#9d5527,#67311a)',Palomino:'linear-gradient(150deg,#e2c07c,#bb8d40)',Grey:'linear-gradient(150deg,#c7bfb1,#8e857a)'}[c],flexShrink:0,fontFamily:'Spectral,serif',fontSize:11,color:'rgba(255,255,255,.5)',fontWeight:600,display:'flex',alignItems:'center',justifyContent:'center'}}>{h[0]}</div>
                    <span style={{fontSize:13,fontWeight:600,color:'#2f2a23'}}>{h}</span>
                  </div>
                  <span style={{fontSize:12,color:'#5a5345'}}>{r}</span>
                  <span style={{fontSize:12,color:'#5a5345'}}>{r}</span>
                  <div style={{display:'flex',justifyContent:'center'}}>
                    <div style={{width:20,height:20,borderRadius:6,border:`2px solid ${pm?'#3C7A57':'#cfc3a8'}`,background:pm?'#3C7A57':'#fff',display:'flex',alignItems:'center',justifyContent:'center'}}>
                      {pm&&<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth="3.2" strokeLinecap="round"><path d="M20 6 9 17l-5-5"/></svg>}
                    </div>
                  </div>
                </div>
              ))}
            </div>
          </div>
          <div>
            <div style={{fontSize:11,fontWeight:700,letterSpacing:2.5,textTransform:'uppercase',color:'var(--gold-dark)',marginBottom:16}}>Feeding Board</div>
            <h2 style={{fontFamily:'Spectral,serif',fontSize:40,fontWeight:700,color:'#23201C',lineHeight:1.15,marginBottom:18}}>Never miss a feeding round again</h2>
            <p style={{fontSize:16,color:'#7c7363',lineHeight:1.7,marginBottom:28}}>Every horse's AM and PM ration on one screen. Staff check off each animal as they go. Print a clean feed sheet for the barn door. Nothing gets missed.</p>
            {['Per-horse rations with supplements','AM ☀ and PM ☾ checkoff columns','One-click printable feed sheet','Dietary notes always visible'].map(f=>(
              <div key={f} style={{display:'flex',gap:12,alignItems:'center',marginBottom:14}}>
                <div style={{width:20,height:20,borderRadius:'50%',background:'#3C7A57',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
                  <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth="3.5" strokeLinecap="round"><path d="M20 6 9 17l-5-5"/></svg>
                </div>
                <span style={{fontSize:14.5,color:'#5a5345'}}>{f}</span>
              </div>
            ))}
          </div>
        </div>
      </section>

      {/* ═══ TESTIMONIALS ═══ */}
      <section id="testimonials" style={{background:'#EBE2CF',padding:'88px 40px'}}>
        <div style={{maxWidth:1240,margin:'0 auto'}}>
          <div style={{textAlign:'center',marginBottom:56}}>
            <div style={{fontSize:11,fontWeight:700,letterSpacing:2.5,textTransform:'uppercase',color:'var(--gold-dark)',marginBottom:14}}>From the barn</div>
            <h2 style={{fontFamily:'Spectral,serif',fontSize:44,fontWeight:700,color:'#23201C'}}>What stable managers are saying</h2>
          </div>
          <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:20}}>
            {TESTIMONIALS.map(t=>(
              <div key={t.name} style={{background:'#fff',border:'1px solid #E8DFCC',borderRadius:18,padding:'26px 24px',boxShadow:'0 1px 2px rgba(40,30,15,.04)'}}>
                <div style={{marginBottom:18}}>
                  {[1,2,3,4,5].map(i=><span key={i} style={{color:'var(--gold)',fontSize:16}}>★</span>)}
                </div>
                <p style={{fontFamily:'Spectral,serif',fontSize:16,fontStyle:'italic',color:'#2f2a23',lineHeight:1.65,marginBottom:20}}>"{t.quote}"</p>
                <div style={{height:1,background:'#F0E9D8',marginBottom:16}}/>
                <div style={{display:'flex',alignItems:'center',gap:12}}>
                  <div style={{width:40,height:40,borderRadius:'50%',background:'linear-gradient(150deg,#3C7A57,#2a5b3e)',color:'#fff',fontWeight:700,fontSize:13,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>{t.name.split(' ')[0][0]}{t.name.includes('&')?'E':t.name.split(' ').slice(-1)[0][0]||''}</div>
                  <div>
                    <div style={{fontSize:14,fontWeight:700,color:'#23201C'}}>{t.name}</div>
                    <div style={{fontSize:12,color:'#8A8170'}}>{t.stable} · {t.horses} horses</div>
                  </div>
                </div>
              </div>
            ))}
          </div>
        </div>
      </section>

      {/* ═══ PRICING ═══ */}
      <section id="pricing" style={{background:'#fff',padding:'88px 40px'}}>
        <div style={{maxWidth:1100,margin:'0 auto'}}>
          <div style={{textAlign:'center',marginBottom:60}}>
            <div style={{fontSize:11,fontWeight:700,letterSpacing:2.5,textTransform:'uppercase',color:'var(--gold-dark)',marginBottom:14}}>Pricing</div>
            <h2 style={{fontFamily:'Spectral,serif',fontSize:46,fontWeight:700,color:'#23201C'}}>Simple, transparent pricing</h2>
            <p style={{fontSize:16,color:'#8A8170',marginTop:12}}>Start free for 14 days. No credit card required. Cancel anytime.</p>
          </div>
          <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:18,alignItems:'center'}}>
            {PLANS.map(p=><PricingCard key={p.name} {...p} hi={p.name===t.featuredPlan}/>)}
          </div>
        </div>
      </section>

      {/* ═══ EMAIL CAPTURE / CTA ═══ */}
      <section style={{background:'linear-gradient(165deg,#1C3A2E,#0d1f16)',padding:'88px 40px'}}>
        <div style={{maxWidth:640,margin:'0 auto',textAlign:'center'}}>
          <h2 style={{fontFamily:'Spectral,serif',fontSize:50,fontWeight:700,color:'#E9E2D0',lineHeight:1.12,marginBottom:18}}>Ready to organize your barn?</h2>
          <p style={{fontSize:16,color:'#9DBCA8',lineHeight:1.7,marginBottom:40}}>Join hundreds of stables using StableOS to manage horses, boarders, and daily operations. Your 14-day free trial starts the moment you sign up.</p>
          <div style={{display:'flex',gap:10,maxWidth:480,margin:'0 auto 20px'}}>
            <input value={email} onChange={e=>setEmail(e.target.value)} placeholder="your@stable.com" style={{flex:1,padding:'14px 16px',border:'none',borderRadius:12,fontSize:14,fontFamily:'inherit',outline:'none',background:'rgba(255,255,255,.12)',color:'#E9E2D0',backdropFilter:'blur(4px)'}}/>
            <button onClick={()=>window.location.href='onboarding.html'}
              style={{background:'var(--gold)',color:'#1C3A2E',border:'none',borderRadius:12,padding:'14px 22px',fontFamily:'inherit',fontSize:14,fontWeight:700,cursor:'pointer',whiteSpace:'nowrap',flexShrink:0}}>
              Get started →
            </button>
          </div>
          <p style={{fontSize:12,color:'#7FA089'}}>Free migration assistance · No setup fees · Cancel anytime</p>
        </div>
      </section>

      {/* ═══ FOOTER ═══ */}
      <footer style={{background:'#0a1a12',padding:'36px 40px'}}>
        <div style={{maxWidth:1240,margin:'0 auto',display:'flex',alignItems:'center',justifyContent:'space-between',flexWrap:'wrap',gap:16}}>
          <LOGO/>
          <div style={{display:'flex',gap:28}}>
            {['Features','Pricing','Sign in','Privacy'].map(l=>(
              <a key={l} href="#" style={{fontSize:13,color:'#7FA089',fontWeight:500}}>{l}</a>
            ))}
          </div>
          <div style={{fontSize:12.5,color:'#7FA089'}}>© 2026 StableOS · Built for the barn · Georgetown, TX</div>
        </div>
      </footer>

      <TweaksPanel>
        <TweakSection label="Brand" />
        <TweakColor label="Accent" value={accent} options={ACCENT_OPTIONS}
          onChange={(v)=>setTweak('accent', v)} />
        <TweakSection label="Pricing" />
        <TweakRadio label="Featured plan" value={t.featuredPlan}
          options={['Basic','Professional','Enterprise']}
          onChange={(v)=>setTweak('featuredPlan', v)} />
        <TweakSection label="Hero" />
        <TweakText label="CTA label" value={t.ctaText}
          onChange={(v)=>setTweak('ctaText', v)} />
        <TweakToggle label="Beta badge" value={t.showBadge}
          onChange={(v)=>setTweak('showBadge', v)} />
        <TweakToggle label="Trusted-by strip" value={t.showSocialProof}
          onChange={(v)=>setTweak('showSocialProof', v)} />
      </TweaksPanel>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
