<!-- @dsCard group="StableOS" viewport="1440x900" name="Medical Records" subtitle="Vaccination status matrix, coming-due alerts, and vet history timeline" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>StableOS — Medical Records</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Spectral:ital,wght@0,400;0,600;0,700;1,400&family=Hanken+Grotesk:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:'Hanken Grotesk',system-ui,sans-serif;background:#EBE2CF;-webkit-font-smoothing:antialiased;height:100vh;overflow:hidden}a{text-decoration:none;color:inherit}::-webkit-scrollbar{width:9px}::-webkit-scrollbar-thumb{background:#cdbf9f;border-radius:8px;border:2.5px solid transparent;background-clip:content-box}</style>
</head>
<body><div id="root" style="height:100vh"></div>
<script type="text/babel">
const COAT={Bay:'linear-gradient(150deg,#6e4524,#39230f)',Chestnut:'linear-gradient(150deg,#9d5527,#67311a)',Sorrel:'linear-gradient(150deg,#a85f30,#79401e)',Palomino:'linear-gradient(150deg,#e2c07c,#bb8d40)',Grey:'linear-gradient(150deg,#c7bfb1,#8e857a)',Black:'linear-gradient(150deg,#3b332c,#181410)',Buckskin:'linear-gradient(150deg,#cfa563,#8c6c3a)'};
const dot=s=>({current:'#3C7A57',due:'#C99A4A',overdue:'#B4502E'})[s]||'#cdbf9f';
const bg=s=>({current:'#E5F0E7',due:'#F6ECD2',overdue:'#FBEAE2'})[s]||'#F1EADA';
const cl=s=>({current:'#3C7A57',due:'#9c7026',overdue:'#B4502E'})[s]||'#5a5345';
const lbl=s=>({current:'Current',due:'Due soon',overdue:'Overdue'})[s]||s;

const VAX=[
  {h:'Georgia', c:'Bay',     g:'current',e:'current',r:'current',f:'current'},
  {h:'Sophie',  c:'Chestnut',g:'current',e:'due',    r:'current',f:'due'},
  {h:'Alvin',   c:'Sorrel',  g:'current',e:'due',    r:'current',f:'due'},
  {h:'Foxy',    c:'Palomino',g:'overdue',e:'current',r:'overdue',f:'current'},
  {h:'Rio',     c:'Bay',     g:'current',e:'current',r:'current',f:'current'},
  {h:'Pretzel', c:'Grey',    g:'current',e:'current',r:'current',f:'due'},
  {h:'Amali',   c:'Black',   g:'current',e:'current',r:'current',f:'due'},
  {h:'Journey', c:'Buckskin',g:'current',e:'current',r:'current',f:'current'},
  {h:'Santana', c:'Chestnut',g:'current',e:'due',    r:'current',f:'current'},
  {h:'Malibu',  c:'Palomino',g:'current',e:'current',r:'due',    f:'current'},
  {h:'Jig',     c:'Bay',     g:'current',e:'current',r:'current',f:'current'},
  {h:'Diamond', c:'Chestnut',g:'current',e:'overdue',r:'current',f:'current'},
];

const DUE=VAX.flatMap(v=>[
  v.g!=='current'&&{h:v.h,c:v.c,type:'Coggins',s:v.g},
  v.e!=='current'&&{h:v.h,c:v.c,type:'EWT/WNV',s:v.e},
  v.r!=='current'&&{h:v.h,c:v.c,type:'Rabies',s:v.r},
  v.f!=='current'&&{h:v.h,c:v.c,type:'Flu/Rhino',s:v.f},
].filter(Boolean));

const NOTES=[
  {h:'Foxy',    c:'Palomino',date:'Jun 5',type:'Lameness check',who:'Dr. Alvarez',note:'Front left fetlock swelling. Rest prescribed, no riding for 2 weeks. Follow up Jun 19.'},
  {h:'Rio',     c:'Bay',     date:'May 28',type:'Spring shots',who:'Dr. Alvarez',note:'EWT and WNV administered. Rabies and Flu/Rhino booster due next cycle.'},
  {h:'Diamond', c:'Chestnut',date:'May 15',type:'Wellness exam',who:'Dr. Chen',note:'Annual wellness check. Mild ulcer risk noted. Added GastroGuard to AM ration.'},
  {h:'Pretzel', c:'Grey',    date:'Apr 12',type:'Dental float',who:'Dr. Rivera',note:'Full float completed. Check in 6 months. No significant wear issues.'},
];

const NAV=[{href:'app.html',id:'dashboard',label:'Dashboard'},{href:'app.html',id:'horses',label:'Horses'},{href:'boarders.html',id:'boarders',label:'Boarders'},{href:'app.html',id:'feeding',label:'Feeding Board'},{href:'tasks.html',id:'tasks',label:'Daily Tasks',badge:'6'},{href:'medical.html',id:'medical',label:'Medical Records',active:true},{href:'calendar.html',id:'calendar',label:'Arena Calendar'},{href:'facility.html',id:'facility',label:'Facility Map'},{href:'messages.html',id:'messages',label:'Messages',badge:'2'},{href:'billing.html',id:'billing',label:'Billing'},{href:'reports.html',id:'reports',label:'Reports'}];
const ICONS={dashboard:'<path d="M3 10.5 12 3l9 7.5"/><path d="M5 9.5V21h14V9.5"/><path d="M9.5 21v-6h5v6"/>',horses:'<path d="M5 21V9l4-3 3 2.5h3a3 3 0 0 1 3 3V21"/><path d="M5 13h6"/><path d="M9 21v-5"/>',boarders:'<circle cx="9" cy="8" r="3.2"/><path d="M3.5 20a5.5 5.5 0 0 1 11 0"/>',feeding:'<path d="M5 8h14l-1.4 11.2a2 2 0 0 1-2 1.8H8.4a2 2 0 0 1-2-1.8Z"/><path d="M5 8l1-3.5h12L19 8"/>',tasks:'<path d="M9 11l2 2 4-4"/><rect x="3.5" y="4.5" width="17" height="16" rx="3"/><path d="M8 3v3M16 3v3"/>',medical:'<path d="M3 12h4l2-5 3 10 2-7 2 2h5"/>',calendar:'<rect x="3.5" y="5" width="17" height="15.5" rx="3"/><path d="M3.5 9.5h17M8 3v4M16 3v4"/>',facility:'<path d="m9 4 6 2 5-2v14l-5 2-6-2-5 2V6Z"/>',messages:'<path d="M4 5h16a1 1 0 0 1 1 1v10a1 1 0 0 1-1 1H9l-4 4V6a1 1 0 0 1 1-1Z"/>',billing:'<rect x="2" y="5" width="20" height="14" rx="2"/><path d="M2 10h20"/>',reports:'<path d="M3 12h4l2-5 3 10 2-7 2 2h5"/>'};

function Sidebar(){return(<aside style={{width:248,flexShrink:0,background:'linear-gradient(180deg,#1C3A2E,#15291F)',color:'#E9E2D0',display:'flex',flexDirection:'column'}}><div style={{padding:'20px 18px 14px',display:'flex',alignItems:'center',gap:11,borderBottom:'1px solid rgba(255,255,255,.07)'}}><div style={{width:38,height:38,borderRadius:10,background:'linear-gradient(150deg,#C99A4A,#9c7026)',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#1C3A2E" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M5 21V8l4-3 4 3v3h3a3 3 0 0 1 3 3v7"/><path d="M5 14h6"/><path d="M9 21v-4"/></svg></div><div><div style={{fontFamily:'Spectral,serif',fontWeight:700,fontSize:15,lineHeight:1}}>The Winners Stable</div><div style={{fontSize:10.5,color:'#9DBCA8',letterSpacing:1.3,textTransform:'uppercase',marginTop:4}}>Georgetown, TX</div></div></div><nav style={{flex:1,overflowY:'auto',padding:'14px 10px',display:'flex',flexDirection:'column',gap:3}}>{NAV.map(n=><a key={n.id} href={n.href} style={{display:'flex',alignItems:'center',gap:11,borderRadius:10,padding:'10px 12px',fontSize:13.5,fontWeight:n.active?600:500,background:n.active?'rgba(201,154,74,.16)':'transparent',color:n.active?'#F3E7CB':'#BBD0C2',boxShadow:n.active?'inset 3px 0 0 #C99A4A':'none',textDecoration:'none',transition:'.15s'}}><span style={{width:20,height:20,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}><svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" dangerouslySetInnerHTML={{__html:ICONS[n.id]||''}}/></span><span style={{flex:1}}>{n.label}</span>{n.badge&&<span style={{background:'#B4502E',color:'#fff',fontSize:10.5,fontWeight:700,minWidth:18,height:18,padding:'0 5px',borderRadius:9,display:'flex',alignItems:'center',justifyContent:'center'}}>{n.badge}</span>}</a>)}</nav><div style={{padding:'12px 14px',borderTop:'1px solid rgba(255,255,255,.07)',display:'flex',alignItems:'center',gap:10}}><div style={{width:36,height:36,borderRadius:'50%',background:'linear-gradient(150deg,#3C7A57,#2a5b3e)',display:'flex',alignItems:'center',justifyContent:'center',fontWeight:700,fontSize:13,color:'#fff',flexShrink:0}}>CE</div><div style={{flex:1,minWidth:0}}><div style={{fontSize:13.5,fontWeight:600}}>Chris & Eileen</div><div style={{fontSize:11.5,color:'#9DBCA8'}}>Manager</div></div></div></aside>);}

function App() {
  const [addOpen, setAddOpen] = React.useState(false);

  return (
    <div style={{display:'flex',height:'100vh',overflow:'hidden',background:'#EBE2CF'}}>
      <Sidebar/>
      <div style={{flex:1,minWidth:0,display:'flex',flexDirection:'column'}}>
        <header style={{height:68,flexShrink:0,background:'rgba(247,242,231,.88)',backdropFilter:'blur(8px)',borderBottom:'1px solid #E0D5BC',display:'flex',alignItems:'center',gap:16,padding:'0 26px'}}>
          <div style={{flex:1}}><div style={{fontFamily:'Spectral,serif',fontSize:22,fontWeight:600,color:'#23201C'}}>Medical Records</div><div style={{fontSize:12,color:'#8A8170',marginTop:2}}>{VAX.length} horses · {DUE.filter(d=>d.s==='overdue').length} overdue · {DUE.filter(d=>d.s==='due').length} due soon</div></div>
          <button onClick={()=>setAddOpen(true)} style={{display:'flex',alignItems:'center',gap:7,background:'#1C3A2E',color:'#F1EBDB',border:'none',borderRadius:10,padding:'10px 16px',fontFamily:'inherit',fontSize:13,fontWeight:600,cursor:'pointer',boxShadow:'0 4px 12px rgba(28,58,46,.25)'}}>
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#F1EBDB" strokeWidth="2.4" strokeLinecap="round"><path d="M12 5v14M5 12h14"/></svg>Log record
          </button>
        </header>

        <main style={{flex:1,overflowY:'auto',padding:'22px 26px 48px'}}>
          <div style={{maxWidth:1180,margin:'0 auto',display:'flex',flexDirection:'column',gap:18}}>

            {/* Coming due */}
            <div style={{background:'#fff',border:'1px solid #E8DFCC',borderRadius:16,padding:'18px 20px',boxShadow:'0 1px 2px rgba(40,30,15,.04)'}}>
              <div style={{display:'flex',alignItems:'center',gap:9,marginBottom:14}}>
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#B4502E" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>
                <div style={{fontFamily:'Spectral,serif',fontSize:18,fontWeight:600,color:'#23201C',flex:1}}>Coming due</div>
                <span style={{background:'#FBEAE2',color:'#B4502E',fontSize:11.5,fontWeight:700,padding:'3px 11px',borderRadius:20}}>{DUE.length} items</span>
              </div>
              <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(240px,1fr))',gap:10}}>
                {DUE.map((d,i)=>(
                  <div key={i} style={{display:'flex',alignItems:'center',gap:12,padding:13,border:'1px solid #EFE6D0',borderRadius:13}}>
                    <div style={{width:38,height:38,borderRadius:10,background:COAT[d.c]||COAT.Bay,flexShrink:0,display:'flex',alignItems:'center',justifyContent:'center',fontFamily:'Spectral,serif',fontSize:15,color:'rgba(255,255,255,.5)',fontWeight:600}}>{d.h[0]}</div>
                    <div style={{flex:1,minWidth:0}}><div style={{fontSize:14,fontWeight:600,color:'#2f2a23'}}>{d.h}</div><div style={{fontSize:12,color:'#8A8170'}}>{d.type}</div></div>
                    <span style={{fontSize:10.5,fontWeight:700,color:cl(d.s),background:bg(d.s),padding:'3px 9px',borderRadius:20,flexShrink:0}}>{lbl(d.s)}</span>
                  </div>
                ))}
              </div>
            </div>

            {/* Two-column: vax matrix + notes */}
            <div style={{display:'grid',gridTemplateColumns:'1.4fr 1fr',gap:18,alignItems:'start'}}>
              {/* Vax matrix */}
              <div style={{background:'#fff',border:'1px solid #E8DFCC',borderRadius:16,overflow:'hidden',boxShadow:'0 1px 2px rgba(40,30,15,.04)'}}>
                <div style={{fontFamily:'Spectral,serif',fontSize:18,fontWeight:600,color:'#23201C',padding:'18px 20px 12px'}}>Vaccination status</div>
                <div style={{display:'grid',gridTemplateColumns:'1.4fr 1fr 1fr 1fr 1fr',gap:8,padding:'10px 20px',background:'#FBF6EC',borderTop:'1px solid #EFE6D0',borderBottom:'1px solid #EFE6D0',fontSize:10.5,fontWeight:700,color:'#9a9081',textTransform:'uppercase',letterSpacing:.4}}>
                  <div>Horse</div><div style={{textAlign:'center'}}>Coggins</div><div style={{textAlign:'center'}}>EWT/WNV</div><div style={{textAlign:'center'}}>Rabies</div><div style={{textAlign:'center'}}>Flu/Rhino</div>
                </div>
                {VAX.map((v,i)=>(
                  <div key={v.h} style={{display:'grid',gridTemplateColumns:'1.4fr 1fr 1fr 1fr 1fr',gap:8,padding:'11px 20px',borderBottom:i<VAX.length-1?'1px solid #F4EEDE':'none',alignItems:'center'}}>
                    <div style={{display:'flex',alignItems:'center',gap:10,minWidth:0}}>
                      <div style={{width:26,height:26,borderRadius:7,background:COAT[v.c]||COAT.Bay,flexShrink:0,display:'flex',alignItems:'center',justifyContent:'center',fontFamily:'Spectral,serif',fontSize:11,color:'rgba(255,255,255,.55)',fontWeight:600}}>{v.h[0]}</div>
                      <span style={{fontSize:13.5,fontWeight:600,color:'#2f2a23',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{v.h}</span>
                    </div>
                    {[v.g,v.e,v.r,v.f].map((s,j)=>(
                      <div key={j} style={{display:'flex',flexDirection:'column',alignItems:'center',gap:3}}>
                        <span style={{width:9,height:9,borderRadius:'50%',background:dot(s)}}/>
                        <span style={{fontSize:9.5,color:cl(s),fontWeight:700}}>{lbl(s).split(' ')[0]}</span>
                      </div>
                    ))}
                  </div>
                ))}
              </div>

              {/* Vet notes */}
              <div style={{background:'#fff',border:'1px solid #E8DFCC',borderRadius:16,padding:'18px 20px',boxShadow:'0 1px 2px rgba(40,30,15,.04)'}}>
                <div style={{display:'flex',alignItems:'center',marginBottom:16}}>
                  <div style={{fontFamily:'Spectral,serif',fontSize:17,fontWeight:600,color:'#23201C',flex:1}}>Recent vet activity</div>
                  <button onClick={()=>setAddOpen(true)} style={{fontSize:12,fontWeight:600,color:'#3C7A57',background:'none',border:'none',cursor:'pointer'}}>+ Add entry</button>
                </div>
                <div style={{display:'flex',flexDirection:'column',gap:0}}>
                  {NOTES.map((n,i)=>(
                    <div key={i} style={{display:'flex',gap:14,paddingBottom:16}}>
                      <div style={{display:'flex',flexDirection:'column',alignItems:'center',flexShrink:0}}>
                        <div style={{width:11,height:11,borderRadius:'50%',background:'#3C7A57',border:'2.5px solid #c4dcc9'}}/>
                        {i<NOTES.length-1&&<div style={{width:2,flex:1,background:'#EDE5D2',marginTop:3}}/>}
                      </div>
                      <div style={{flex:1}}>
                        <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:3,flexWrap:'wrap'}}>
                          <span style={{fontSize:14,fontWeight:700,color:'#2f2a23'}}>{n.h}</span>
                          <span style={{fontSize:11,color:'#9a9081'}}>· {n.date}</span>
                        </div>
                        <div style={{fontSize:12,fontWeight:700,color:'#9c7026',marginBottom:4}}>{n.type} · {n.who}</div>
                        <div style={{fontSize:13,color:'#5a5345',lineHeight:1.5}}>{n.note}</div>
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            </div>
          </div>
        </main>
      </div>

      {/* Log record modal */}
      {addOpen&&(
        <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.45)',zIndex:400,display:'flex',alignItems:'center',justifyContent:'center',padding:20}} onClick={()=>setAddOpen(false)}>
          <div style={{background:'#fff',borderRadius:18,padding:26,width:'100%',maxWidth:460,boxShadow:'0 24px 60px rgba(0,0,0,.3)'}} onClick={e=>e.stopPropagation()}>
            <div style={{display:'flex',alignItems:'center',marginBottom:20}}>
              <div style={{fontFamily:'Spectral,serif',fontSize:20,fontWeight:600,color:'#23201C',flex:1}}>Log medical record</div>
              <button onClick={()=>setAddOpen(false)} style={{width:32,height:32,borderRadius:8,border:'1px solid #E4D9C0',background:'#FBF6EC',color:'#5a5345',fontSize:18,display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',fontFamily:'inherit'}}>×</button>
            </div>
            {[['Horse','select',VAX.map(v=>v.h)],['Record type','select',['Vaccination','Vet visit','Farrier','Dental','Lameness check','Other']],['Date','text',[]],['Provider','text',[]],['Notes','textarea',[]]].map(([l,t,opts])=>(
              <div key={l} style={{marginBottom:13}}>
                <div style={{fontSize:11,fontWeight:700,color:'#9a9081',textTransform:'uppercase',letterSpacing:.5,marginBottom:4}}>{l}</div>
                {t==='textarea'
                  ? <textarea rows={3} style={{width:'100%',padding:'9px 12px',border:'1.5px solid #E4D9C0',borderRadius:9,fontSize:14,fontFamily:'inherit',outline:'none',background:'#FFFDF7',resize:'vertical',lineHeight:1.5}}/>
                  : t==='select'
                  ? <select style={{width:'100%',padding:'9px 12px',border:'1.5px solid #E4D9C0',borderRadius:9,fontSize:14,fontFamily:'inherit',outline:'none',background:'#fff',cursor:'pointer',appearance:'none'}}>{opts.map(o=><option key={o}>{o}</option>)}</select>
                  : <input type="text" placeholder={l==='Date'?'e.g. Jun 13, 2026':''} style={{width:'100%',padding:'9px 12px',border:'1.5px solid #E4D9C0',borderRadius:9,fontSize:14,fontFamily:'inherit',outline:'none',background:'#FFFDF7'}}/>}
              </div>
            ))}
            <div style={{display:'flex',gap:10,marginTop:20}}>
              <button onClick={()=>setAddOpen(false)} style={{flex:1,padding:12,background:'#1C3A2E',color:'#F1EBDB',border:'none',borderRadius:11,fontFamily:'inherit',fontSize:14,fontWeight:600,cursor:'pointer'}}>Save record</button>
              <button onClick={()=>setAddOpen(false)} style={{padding:'12px 18px',background:'#FBF6EC',color:'#5a5345',border:'1px solid #E4D9C0',borderRadius:11,fontFamily:'inherit',fontSize:14,cursor:'pointer'}}>Cancel</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
