<link href="https://fonts.googleapis.com/css2?family=Spectral:ital,wght@0,400;0,600;0,700;1,400&family=Hanken+Grotesk:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>

<template id="__bundler_thumbnail" data-bg-color="#1C3A2E">

    <rect x="216" y="200" width="198" height="52" rx="10" fill="none"/>

<body><div id="root" style="height:100vh"></div>
<script type="text/babel">
const PALETTE = ['#3C7A57','#9c7026','#7A4A2B','#5a6b8c','#a05a4a','#4a7a8c'];
const hc = n => { let h=0; for(const c of (n||'')) h=(h*31+c.charCodeAt(0))>>>0; return PALETTE[h%PALETTE.length]; };
const ini = n => (n||'').split(' ').map(w=>w[0]).filter(Boolean).slice(0,2).join('').toUpperCase();

const THREADS = [
  {id:'t1',name:'Marisol Vega',role:'Boarder',unread:true,time:'9:12 AM',snippet:"Could we move Reno's Thursday less...",msgs:[
    {me:false,t:'8:58 AM',x:'Morning! Hope all is well at the barn 🐴'},
    {me:false,t:'9:12 AM',x:"Could we move Reno's Thursday lesson to 4pm? Work ran late this week."},
    {me:true, t:'9:20 AM',x:"Morning Marisol! 4pm in the Covered Arena works — I'll update the calendar."},
  ]},
  {id:'t2',name:'Luis Romero',role:'Head Groom',unread:true,time:'8:40 AM',snippet:'Heads up — the trough in Barn B is le...',msgs:[
    {me:false,t:'8:40 AM',x:'Heads up — the trough in Barn B is leaking again, shut the valve for now.'},
    {me:true, t:'8:45 AM',x:"Thanks Luis. I'll add it to today's tasks and call the plumber."},
  ]},
  {id:'t3',name:'Barn Staff',role:'Group · 4',color:'#4a6741',unread:false,time:'Yesterday',snippet:'Sam: Arena drag done, footing is great for...',msgs:[
    {me:false,t:'7:30 AM',x:'Becca: Stalls 1–6 mucked, geldings turned out.'},
    {me:false,t:'7:55 AM',x:'Sam: Arena drag done, footing is great for lessons today.'},
    {me:true, t:'8:05 AM',x:"Perfect, thanks team. Rain expected tonight — blanket list is on the board."},
  ]},
  {id:'t4',name:'Priya Nair',role:'Boarder',unread:false,time:'Yesterday',snippet:"When is Pearl due for her Coggins? Want ...",msgs:[
    {me:false,t:'4:10 PM',x:"When is Pearl due for her Coggins? Want to schedule a show next month."},
    {me:true, t:'4:30 PM',x:"Pearl's Coggins is due Jun 15 — Dr. Alvarez is out next Tuesday, I'll add her."},
    {me:false,t:'4:32 PM',x:'Perfect, thank you!'},
  ]},
  {id:'t5',name:'Sam Okafor',role:'Trainer',unread:false,time:'Mon',snippet:'Can I book the Covered Arena Fri 2–4pm ...',msgs:[
    {me:false,t:'Mon 3:00 PM',x:'Can I book the Covered Arena Fri 2–4pm for the clinic prep?'},
    {me:true, t:'Mon 3:15 PM',x:'Booked it — blocked the outdoor as backup too.'},
  ]},
];

const NAV = [
  {href:'app.html',      id:'dashboard',label:'Dashboard'},
  {href:'app.html',      id:'horses',   label:'Horses'},
  {href:'boarders.html', id:'boarders', label:'Boarders'},
  {href:'app.html',      id:'feeding',  label:'Feeding Board'},
  {href:'app.html',      id:'tasks',    label:'Daily Tasks', badge:'6'},
  {href:'medical.html',  id:'medical',  label:'Medical Records'},
  {href:'calendar.html', id:'calendar', label:'Arena Calendar'},
  {href:'facility.html', id:'facility', label:'Facility Map'},
  {href:'messages.html', id:'messages', label:'Messages', badge:'2', active:true},
];
const ICONS = {
  dashboard:'<path d="M3 10.5 12 3l9 7.5"/><path d="M5 9.5V21h14V9.5"/><path d="M9.5 21v-6h5v6"/>',
  horses:'<path d="M5 21V9l4-3 3 2.5h3a3 3 0 0 1 3 3V21"/><path d="M5 13h6"/><path d="M9 21v-5"/>',
  boarders:'<circle cx="9" cy="8" r="3.2"/><path d="M3.5 20a5.5 5.5 0 0 1 11 0"/>',
  feeding:'<path d="M5 8h14l-1.4 11.2a2 2 0 0 1-2 1.8H8.4a2 2 0 0 1-2-1.8Z"/><path d="M5 8l1-3.5h12L19 8"/>',
  tasks:'<path d="M9 11l2 2 4-4"/><rect x="3.5" y="4.5" width="17" height="16" rx="3"/><path d="M8 3v3M16 3v3"/>',
  medical:'<path d="M3 12h4l2-5 3 10 2-7 2 2h5"/>',
  calendar:'<rect x="3.5" y="5" width="17" height="15.5" rx="3"/><path d="M3.5 9.5h17M8 3v4M16 3v4"/>',
  facility:'<path d="m9 4 6 2 5-2v14l-5 2-6-2-5 2V6Z"/>',
  messages:'<path d="M4 5h16a1 1 0 0 1 1 1v10a1 1 0 0 1-1 1H9l-4 4V6a1 1 0 0 1 1-1Z"/>',
};

function Sidebar({role, setRole}) {
  return (
    <aside style={{width:168,flexShrink:0,background:'linear-gradient(180deg,#1C3A2E 0%,#15291F 100%)',color:'#E9E2D0',display:'flex',flexDirection:'column'}}>
      {/* Logo */}
      <div style={{padding:'18px 14px 14px',display:'flex',alignItems:'center',gap:10,borderBottom:'1px solid rgba(255,255,255,.07)'}}>
        <div style={{width:36,height:36,borderRadius:9,background:'linear-gradient(150deg,#C99A4A,#9c7026)',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#1C3A2E" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"><path d="M5 21V8l4-3 4 3v3h3a3 3 0 0 1 3 3v7"/><path d="M5 14h6"/><path d="M9 21v-4"/></svg>
        </div>
        <div>
          <div style={{fontFamily:'Spectral,serif',fontWeight:700,fontSize:13.5,lineHeight:1.15}}>The Winners Stable</div>
          <div style={{fontSize:9.5,color:'#9DBCA8',letterSpacing:1.2,textTransform:'uppercase',marginTop:3}}>Georgetown, TX</div>
        </div>
      </div>

      {/* Role switcher */}
      <div style={{padding:'12px 12px 10px',borderBottom:'1px solid rgba(255,255,255,.07)'}}>
        <div style={{fontSize:9,fontWeight:700,letterSpacing:1.4,textTransform:'uppercase',color:'#6A9B7E',marginBottom:8}}>Viewing as</div>
        <div style={{display:'flex',gap:4}}>
          {['Manager','Staff','Boarder'].map(r=>(
            <button key={r} onClick={()=>setRole(r)} style={{flex:1,padding:'5px 2px',borderRadius:7,border:'none',fontFamily:'inherit',fontSize:11,fontWeight:600,cursor:'pointer',background:role===r?'#9c7026':'rgba(255,255,255,.07)',color:role===r?'#fff':'#9DBCA8',transition:'.15s'}}>
              {r}
            </button>
          ))}
        </div>
      </div>

      {/* Nav */}
      <nav style={{flex:1,overflowY:'auto',padding:'10px 8px',display:'flex',flexDirection:'column',gap:2}}>
        {NAV.map(n=>(
          <a key={n.id} href={n.href} style={{display:'flex',alignItems:'center',gap:9,borderRadius:9,padding:'9px 10px',fontSize:12.5,fontWeight:n.active?600:500,background:n.active?'rgba(201,154,74,.16)':'transparent',color:n.active?'#F3E7CB':'#BBD0C2',boxShadow:n.active?'inset 3px 0 0 #C99A4A':'none',textDecoration:'none',transition:'.12s'}}>
            <span style={{width:17,height:17,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" dangerouslySetInnerHTML={{__html:ICONS[n.id]||''}}/>
            </span>
            <span style={{flex:1}}>{n.label}</span>
            {n.badge&&<span style={{background:'#B4502E',color:'#fff',fontSize:10,fontWeight:700,minWidth:17,height:17,padding:'0 4px',borderRadius:9,display:'flex',alignItems:'center',justifyContent:'center'}}>{n.badge}</span>}
          </a>
        ))}
      </nav>

      {/* Footer */}
      <div style={{padding:'11px 12px',borderTop:'1px solid rgba(255,255,255,.07)',display:'flex',alignItems:'center',gap:9}}>
        <div style={{width:32,height:32,borderRadius:'50%',background:'linear-gradient(150deg,#3C7A57,#2a5b3e)',display:'flex',alignItems:'center',justifyContent:'center',fontWeight:700,fontSize:12,color:'#fff',flexShrink:0}}>CS</div>
        <div style={{flex:1,minWidth:0}}>
          <div style={{fontSize:12.5,fontWeight:600,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>Chris &amp; Eileen Sikes</div>
          <div style={{fontSize:11,color:'#9DBCA8'}}>Owners</div>
        </div>
        <button style={{width:26,height:26,borderRadius:7,border:'1px solid rgba(255,255,255,.1)',background:'transparent',color:'#9DBCA8',display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',flexShrink:0,padding:0}}>
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
      </div>
    </aside>
  );
}

function App() {
  const [role, setRole] = React.useState('Manager');
  const [activeId, setActiveId] = React.useState('t1');
  const [compose, setCompose] = React.useState('');
  const [search, setSearch] = React.useState('');
  const [threads, setThreads] = React.useState(THREADS);
  const msgEndRef = React.useRef(null);
  const active = threads.find(t=>t.id===activeId)||threads[0];

  React.useEffect(()=>{
    if(msgEndRef.current) msgEndRef.current.scrollTop = msgEndRef.current.scrollHeight;
  },[activeId, threads]);

  const send = () => {
    if (!compose.trim()) return;
    const now = new Date().toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});
    setThreads(ts=>ts.map(t=>t.id===activeId?{...t,msgs:[...t.msgs,{me:true,t:now,x:compose}],snippet:compose.slice(0,40)+'...',time:now,unread:false}:t));
    setCompose('');
  };

  const select = id => {
    setThreads(ts=>ts.map(t=>t.id===id?{...t,unread:false}:t));
    setActiveId(id);
  };

  const filtered = threads.filter(t=>!search || t.name.toLowerCase().includes(search.toLowerCase()) || t.snippet.toLowerCase().includes(search.toLowerCase()));
  const unreadCount = threads.filter(t=>t.unread).length;

  return (
    <div style={{display:'flex',height:'100vh',overflow:'hidden'}}>
      <Sidebar role={role} setRole={setRole}/>

      <div style={{flex:1,minWidth:0,display:'flex',flexDirection:'column',background:'#EBE2CF'}}>
        {/* Top bar */}
        <header style={{height:60,flexShrink:0,background:'rgba(247,242,231,.92)',backdropFilter:'blur(10px)',borderBottom:'1px solid #DDD4BC',display:'flex',alignItems:'center',gap:14,padding:'0 22px',zIndex:10}}>
          <div style={{flex:1}}>
            <div style={{fontFamily:'Spectral,serif',fontSize:21,fontWeight:600,color:'#1C3A2E',lineHeight:1}}>Messages</div>
            <div style={{fontSize:11.5,color:'#9a9081',marginTop:2}}>Staff &amp; boarder conversations</div>
          </div>
          {/* Search */}
          <div style={{display:'flex',alignItems:'center',gap:8,background:'#FAF5EB',border:'1px solid #E0D5BC',borderRadius:10,padding:'7px 13px',width:220}}>
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#a9a08f" strokeWidth="2" strokeLinecap="round"><circle cx="11" cy="11" r="7"/><path d="m21 21-4-4"/></svg>
            <span style={{fontSize:12.5,color:'#a9a08f'}}>Search horses, people…</span>
          </div>
          {/* Weather */}
          <div style={{display:'flex',alignItems:'center',gap:5,padding:'6px 11px',background:'#FAF5EB',border:'1px solid #E0D5BC',borderRadius:10}}>
            <span style={{fontSize:15}}>🌤</span>
            <div style={{fontSize:12,fontWeight:600,color:'#2f2a23',lineHeight:1}}>78°</div>
            <div style={{fontSize:10,color:'#9a9081',lineHeight:1}}>Clear</div>
          </div>
          {/* Bell */}
          <button style={{width:36,height:36,borderRadius:9,border:'1px solid #E0D5BC',background:'#FAF5EB',display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',position:'relative',flexShrink:0}}>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#5a5345" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
          </button>
          {/* + New */}
          <button style={{display:'flex',alignItems:'center',gap:7,background:'#1C3A2E',color:'#F1EBDB',border:'none',borderRadius:10,padding:'9px 15px',fontFamily:'inherit',fontSize:13,fontWeight:600,cursor:'pointer',flexShrink:0}}>
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><path d="M12 5v14M5 12h14"/></svg>
            New
          </button>
        </header>

        {/* Content */}
        <div style={{flex:1,overflow:'hidden',padding:'18px 22px'}}>
          <div style={{display:'grid',gridTemplateColumns:'230px 1fr',gap:14,height:'100%'}}>

            {/* Thread list */}
            <div style={{background:'#fff',border:'1px solid #E4D9C0',borderRadius:14,overflow:'hidden',display:'flex',flexDirection:'column',boxShadow:'0 1px 3px rgba(40,30,15,.05)'}}>
              {/* Search bar */}
              <div style={{padding:'12px 12px 8px',borderBottom:'1px solid #F0E9D8'}}>
                <div style={{display:'flex',alignItems:'center',gap:8,background:'#FBF6EC',border:'1px solid #EFE6D0',borderRadius:9,padding:'8px 11px'}}>
                  <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#b0a690" strokeWidth="2" strokeLinecap="round"><circle cx="11" cy="11" r="7"/><path d="m21 21-4-4"/></svg>
                  <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search messages" style={{border:'none',outline:'none',background:'transparent',fontFamily:'inherit',fontSize:12.5,color:'#2f2a23',width:'100%'}}/>
                </div>
              </div>
              {/* Threads */}
              <div style={{flex:1,overflowY:'auto',padding:'6px 6px'}}>
                {filtered.map(t=>(
                  <div key={t.id} onClick={()=>select(t.id)} style={{display:'flex',alignItems:'flex-start',gap:10,padding:'10px 9px',borderRadius:10,cursor:'pointer',background:activeId===t.id?'#F5EDDA':'transparent',marginBottom:1,transition:'.1s'}}>
                    <div style={{width:40,height:40,borderRadius:'50%',background:t.color||hc(t.name),color:'#fff',fontWeight:700,fontSize:13,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,letterSpacing:.5}}>{ini(t.name)}</div>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{display:'flex',alignItems:'center',gap:4,marginBottom:1}}>
                        <span style={{fontSize:13.5,fontWeight:600,color:'#2f2a23',flex:1,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{t.name}</span>
                        <span style={{fontSize:10.5,color:'#a9a08f',flexShrink:0}}>{t.time}</span>
                        {t.unread&&<span style={{width:8,height:8,background:'#3C7A57',borderRadius:'50%',flexShrink:0}}/>}
                      </div>
                      <div style={{fontSize:11,color:'#9c7026',fontWeight:600,marginBottom:2}}>{t.role}</div>
                      <div style={{fontSize:12,color:'#8A8170',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{t.snippet}</div>
                    </div>
                  </div>
                ))}
              </div>
            </div>

            {/* Conversation panel */}
            <div style={{background:'#fff',border:'1px solid #E4D9C0',borderRadius:14,overflow:'hidden',display:'flex',flexDirection:'column',boxShadow:'0 1px 3px rgba(40,30,15,.05)'}}>
              {/* Header */}
              <div style={{display:'flex',alignItems:'center',gap:12,padding:'14px 20px',borderBottom:'1px solid #F0E9D8',flexShrink:0,background:'#fff'}}>
                <div style={{width:40,height:40,borderRadius:'50%',background:active.color||hc(active.name),color:'#fff',fontWeight:700,fontSize:13,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,letterSpacing:.5}}>{ini(active.name)}</div>
                <div style={{flex:1}}>
                  <div style={{fontSize:15,fontWeight:700,color:'#1C3A2E',lineHeight:1.1}}>{active.name}</div>
                  <div style={{fontSize:11.5,color:'#9c7026',fontWeight:600,marginTop:2}}>{active.role}</div>
                </div>
                <button style={{width:36,height:36,borderRadius:9,border:'1px solid #E4D9C0',background:'#FBF6EC',display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',flexShrink:0}}>
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#5a5345" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 16.9v3a2 2 0 0 1-2.2 2 19.8 19.8 0 0 1-8.6-3 19.5 19.5 0 0 1-6-6 19.8 19.8 0 0 1-3-8.6A2 2 0 0 1 4.1 2h3a2 2 0 0 1 2 1.7c.1.9.4 1.8.7 2.7a2 2 0 0 1-.5 2.1L8.1 9.9a16 16 0 0 0 6 6l1.4-1.2a2 2 0 0 1 2.1-.5c.9.3 1.8.6 2.7.7a2 2 0 0 1 1.7 2Z"/></svg>
                </button>
              </div>

              {/* Messages */}
              <div ref={msgEndRef} style={{flex:1,overflowY:'auto',padding:'20px 24px',display:'flex',flexDirection:'column',gap:10,background:'#FDFAF3'}}>
                <div style={{textAlign:'center',fontSize:11,color:'#b0a690',letterSpacing:.3,marginBottom:6}}>Today</div>
                {active.msgs.map((m,i)=>(
                  <div key={i} style={{display:'flex',justifyContent:m.me?'flex-end':'flex-start'}}>
                    <div>
                      <div style={{maxWidth:420,padding:'10px 14px',borderRadius:m.me?'16px 4px 16px 16px':'4px 16px 16px 16px',background:m.me?'#1C3A2E':'#fff',color:m.me?'#EBE2CF':'#2f2a23',fontSize:13.5,lineHeight:1.55,border:m.me?'none':'1px solid #E8DFCC',boxShadow:'0 1px 4px rgba(40,30,15,.06)'}}>{m.x}</div>
                      <div style={{fontSize:10.5,color:'#b0a690',marginTop:4,textAlign:m.me?'right':'left'}}>{m.t}</div>
                    </div>
                  </div>
                ))}
              </div>

              {/* Compose */}
              <div style={{padding:'12px 16px',borderTop:'1px solid #EDE6D5',display:'flex',alignItems:'center',gap:10,flexShrink:0,background:'#fff'}}>
                <input
                  value={compose}
                  onChange={e=>setCompose(e.target.value)}
                  onKeyDown={e=>e.key==='Enter'&&!e.shiftKey&&(e.preventDefault(),send())}
                  placeholder="Write a message…"
                  style={{flex:1,border:'none',outline:'none',background:'transparent',fontFamily:'inherit',fontSize:13.5,color:'#2f2a23',padding:'4px 0'}}
                />
                <button onClick={send} style={{width:38,height:38,borderRadius:10,background:'#1C3A2E',border:'none',display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',flexShrink:0,opacity:compose.trim()?1:.5,transition:'opacity .15s'}}>
                  <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="#F1EBDB" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m22 2-7 20-4-9-9-4Z"/><path d="M22 2 11 13"/></svg>
                </button>
              </div>
            </div>

          </div>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
