function Av({ name, size='sm' }) {

  const px = size==='md'?42:34, fs = size==='md'?15:12;
  return <div style={{width:px,height:px,borderRadius:'50%',background:hc(name),color:'#fff',fontWeight:700,fontSize:fs,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>{ini(name)}</div>;

function genPw() {
  const words = ['Barn','Arena','Saddle','Meadow','Canter','Stable','Paddock','Bridle','Pasture','Gallop'];
  const w = words[Math.floor(Math.random()*words.length)];
  return `${w}-${Math.floor(1000+Math.random()*9000)}`;
}
function strength(pw){
  let s=0;
  if(pw.length>=8) s++;
  if(/[A-Z]/.test(pw)&&/[a-z]/.test(pw)) s++;
  if(/\d/.test(pw)) s++;
  if(/[^A-Za-z0-9]/.test(pw)) s++;
  return Math.min(s,4);
}

function Overlay({ children, onClose }) {

  const [pw, setPw] = React.useState(user.temp || '');

          </div>
          <div style={{flex:1}}>
            <div style={{fontFamily:'Spectral,serif',fontSize:19,fontWeight:600,color:'#23201C'}}>{reset?'Reset password':'Set initial password'}</div>
            <div style={{fontSize:12.5,color:'#8A8170',marginTop:1}}>{user.name} · {ROLE[user.role].label}</div>
          </div>
          <button onClick={onClose} style={{width:30,height:30,border:'none',background:'#F3EBD6',borderRadius:8,cursor:'pointer',color:'#8A8170',fontSize:16,lineHeight:1}}>✕</button>
        </div>

        <div style={{padding:'18px 22px 4px'}}>
          <label style={labelS}>{reset?'New temporary password':'Temporary password'}</label>
          <div style={{display:'flex',gap:8}}>
            <div style={{position:'relative',flex:1}}>
              <input value={pw} type={show?'text':'password'} onChange={e=>setPw(e.target.value)} onFocus={()=>setFoc(true)} onBlur={()=>setFoc(false)} placeholder="Type or generate" style={{...inpS(foc),paddingRight:64,fontFamily:'ui-monospace,Menlo,monospace',letterSpacing:show?.5:2}}/>

            </div>
            <button onClick={()=>{setPw(genPw());setShow(true);}} title="Generate" style={{flexShrink:0,display:'flex',alignItems:'center',gap:6,padding:'0 13px',background:'#FBF6EC',border:'1px solid #E4D9C0',borderRadius:9,color:'#5a5345',fontFamily:'inherit',fontSize:12.5,fontWeight:600,cursor:'pointer'}}>
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#9c7026" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 12a9 9 0 1 1-3-6.7M21 4v5h-5"/></svg>Generate
            </button>

          {/* strength */}
          <div style={{display:'flex',alignItems:'center',gap:8,marginTop:9,height:14}}>

            <input type="checkbox" checked={notify} onChange={e=>setNotify(e.target.checked)} style={{width:17,height:17,marginTop:1,accentColor:'#3C7A57',cursor:'pointer'}}/>
            <span>

        </div>
      </div>
    </Overlay>

// ─── First-login (user-side) screen ──────────────────────────────────
function FirstLogin({ user, onClose, onDone }) {
  const [step, setStep] = React.useState(0); // 0 = verify temp, 1 = set new, 2 = done
  const [temp, setTemp] = React.useState('');
  const [np, setNp] = React.useState('');
  const [cp, setCp] = React.useState('');
  const [err, setErr] = React.useState('');
  const [f1,setF1]=React.useState(false),[f2,setF2]=React.useState(false),[f3,setF3]=React.useState(false);
  const st = strength(np);
  const stColors = ['#cdbf9f','#B4502E','#9c7026','#C99A4A','#3C7A57'];
  const stLabel = ['','Weak','Fair','Good','Strong'][st];

  const verify = () => {
    if(temp.trim() !== (user.temp||'').trim()){ setErr('That temporary password doesn\u2019t match. Check the email from your barn admin.'); return; }
    setErr(''); setStep(1);
  };
  const save = () => {
    if(st<2){ setErr('Choose a stronger password — at least 8 characters with a mix of letters and numbers.'); return; }
    if(np!==cp){ setErr('Passwords don\u2019t match.'); return; }
    setErr(''); setStep(2);
  };

  return (
    <div style={{position:'fixed',inset:0,zIndex:60,background:'linear-gradient(160deg,#1C3A2E,#15291F)',display:'flex',alignItems:'center',justifyContent:'center',padding:24,animation:'fade .2s ease'}}>
      {/* faux device chrome top bar */}
      <button onClick={onClose} style={{position:'absolute',top:20,right:24,display:'flex',alignItems:'center',gap:7,background:'rgba(255,255,255,.1)',border:'1px solid rgba(255,255,255,.18)',color:'#E9E2D0',borderRadius:9,padding:'8px 13px',fontFamily:'inherit',fontSize:12.5,fontWeight:600,cursor:'pointer'}}>
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round"><path d="m15 18-6-6 6-6"/></svg>Back to admin (preview)
      </button>
      <div style={{position:'absolute',top:22,left:26,display:'flex',alignItems:'center',gap:10,color:'#E9E2D0'}}>
        <div style={{width:32,height:32,borderRadius:9,background:'linear-gradient(150deg,#C99A4A,#9c7026)',display:'flex',alignItems:'center',justifyContent:'center'}}>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#1C3A2E" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M5 21V8l4-3 4 3v3h3a3 3 0 0 1 3 3v7"/><path d="M5 14h6"/></svg>
        </div>
        <span style={{fontFamily:'Spectral,serif',fontWeight:700,fontSize:15}}>The Winners Stable</span>
      </div>

      <div style={{width:430,maxWidth:'100%',background:'#fff',border:'1px solid #E8DFCC',borderRadius:20,boxShadow:'0 24px 70px rgba(0,0,0,.4)',overflow:'hidden',animation:'pop .25s ease'}}>
        {step<2 && (
          <div style={{padding:'30px 30px 8px'}}>
            <div style={{display:'flex',alignItems:'center',gap:13,marginBottom:18}}>
              <Av name={user.name} size="md"/>
              <div>
                <div style={{fontFamily:'Spectral,serif',fontSize:20,fontWeight:600,color:'#23201C'}}>Welcome, {user.name.split(' ')[0]}</div>
                <div style={{fontSize:12.5,color:'#8A8170'}}>{ROLE[user.role].label} · first sign-in</div>
              </div>
            </div>
            {/* step indicator */}
            <div style={{display:'flex',gap:6,marginBottom:20}}>
              {[0,1].map(i => <div key={i} style={{flex:1,height:4,borderRadius:3,background:i<=step?'#C99A4A':'#EFE6D0',transition:'.2s'}}/>)}
            </div>
          </div>
        )}

        {step===0 && (
          <div style={{padding:'0 30px 26px'}}>
            <p style={{fontSize:13.5,color:'#5a5345',lineHeight:1.55,marginBottom:18}}>Your barn administrator set a temporary password for your account. Enter it to continue, then you'll choose your own.</p>
            <label style={labelS}>Temporary password</label>
            <input value={temp} onChange={e=>setTemp(e.target.value)} onFocus={()=>setF1(true)} onBlur={()=>setF1(false)} placeholder="From your welcome email" style={{...inpS(f1),fontFamily:'ui-monospace,Menlo,monospace'}}/>
            {err && <ErrLine msg={err}/>}
            <button onClick={verify} style={btnPrimary}>Continue</button>
            <p style={{fontSize:11.5,color:'#9a9081',textAlign:'center',marginTop:14}}>Demo temp password: <b style={{color:'#9c7026',fontFamily:'ui-monospace,Menlo,monospace'}}>{user.temp}</b></p>
          </div>
        )}

        {step===1 && (
          <div style={{padding:'0 30px 26px'}}>
            <p style={{fontSize:13.5,color:'#5a5345',lineHeight:1.55,marginBottom:18}}>Choose a password only you know. You'll use this every time you sign in from now on.</p>
            <label style={labelS}>New password</label>
            <input value={np} type="password" onChange={e=>setNp(e.target.value)} onFocus={()=>setF2(true)} onBlur={()=>setF2(false)} placeholder="At least 8 characters" style={inpS(f2)}/>
            <div style={{display:'flex',alignItems:'center',gap:8,margin:'9px 0 14px',height:14}}>
              <div style={{flex:1,display:'flex',gap:4}}>{[0,1,2,3].map(i => <div key={i} style={{flex:1,height:4,borderRadius:3,background:i<st?stColors[st]:'#EFE6D0',transition:'.2s'}}/>)}</div>
              {np && <span style={{fontSize:11,fontWeight:700,color:stColors[st],minWidth:42,textAlign:'right'}}>{stLabel}</span>}
            </div>
            <label style={labelS}>Confirm password</label>
            <input value={cp} type="password" onChange={e=>setCp(e.target.value)} onFocus={()=>setF3(true)} onBlur={()=>setF3(false)} placeholder="Repeat your new password" style={inpS(f3)}/>
            {err && <ErrLine msg={err}/>}
            <button onClick={save} style={btnPrimary}>Set password & continue</button>
          </div>
        )}

        {step===2 && (
          <div style={{padding:'40px 30px 38px',textAlign:'center'}}>
            <div style={{width:64,height:64,borderRadius:'50%',background:'#E5F0E7',border:'1px solid #c4dcc9',display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto 20px'}}>
              <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#3C7A57" strokeWidth="2.4" strokeLinecap="round" strokeLinejoin="round"><path d="M20 6 9 17l-5-5"/></svg>
            </div>
            <h2 style={{fontFamily:'Spectral,serif',fontSize:23,fontWeight:600,color:'#23201C',marginBottom:8}}>You're all set</h2>
            <p style={{fontSize:13.5,color:'#5a5345',lineHeight:1.55,marginBottom:24,maxWidth:300,marginLeft:'auto',marginRight:'auto'}}>Your password is saved. {user.name.split(' ')[0]}'s account now shows as <b style={{color:'#3C7A57'}}>Active</b> in the admin directory.</p>
            <button onClick={()=>onDone(user.id)} style={{...btnPrimary,marginTop:0}}>Enter StableOS</button>
          </div>
        )}
      </div>
    </div>
  );
}
const btnPrimary = {width:'100%',marginTop:18,padding:'13px',background:'#1C3A2E',color:'#F1EBDB',border:'none',borderRadius:11,fontFamily:'inherit',fontSize:14,fontWeight:600,cursor:'pointer',boxShadow:'0 4px 12px rgba(28,58,46,.25)'};

// ─── Toast ───────────────────────────────────────────────────────────
function Toast({ msg }) {
  if(!msg) return null;
  return <div style={{position:'fixed',bottom:24,left:'50%',transform:'translateX(-50%)',zIndex:70,display:'flex',alignItems:'center',gap:10,background:'#1C3A2E',color:'#F1EBDB',padding:'12px 18px',borderRadius:12,boxShadow:'0 12px 34px rgba(0,0,0,.3)',fontSize:13.5,fontWeight:600,animation:'pop .2s ease'}}>
    <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="#C99A4A" strokeWidth="2.4" strokeLinecap="round" strokeLinejoin="round"><path d="M20 6 9 17l-5-5"/></svg>{msg}
  </div>;
}

              <div style={{position:'absolute',top:'calc(100% + 6px)',right:0,width:240,background:'#fff',border:'1px solid #E8DFCC',borderRadius:13,boxShadow:'0 14px 36px rgba(40,30,15,.18)',padding:6,zIndex:30,animation:'pop .15s ease'}}>
                <div style={{fontSize:10,fontWeight:700,color:'#9a9081',textTransform:'uppercase',letterSpacing:.5,padding:'8px 10px 6px'}}>Preview this page as</div>
                {VIEWER_ROLES.map(r => {
                  const m = viewerMeta[r], sel = viewer===r, allowed = CAN_MANAGE.includes(r);
                  return (
                    <button key={r} onClick={()=>{setViewer(r);setRoleOpen(false);}} style={{display:'flex',alignItems:'center',gap:11,width:'100%',padding:'9px 10px',background:sel?'#FBF6EC':'transparent',border:'none',borderRadius:9,cursor:'pointer',fontFamily:'inherit',textAlign:'left'}}>
                      <div style={{width:30,height:30,borderRadius:'50%',background:'linear-gradient(150deg,#3C7A57,#2a5b3e)',color:'#fff',fontWeight:700,fontSize:11,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>{m.ic}</div>
                      <div style={{flex:1,minWidth:0}}>
                        <div style={{fontSize:13.5,fontWeight:600,color:'#23201C'}}>{m.sub}</div>
                        <div style={{fontSize:11.5,color:allowed?'#3C7A57':'#B4502E',fontWeight:600}}>{allowed?'Can manage access':'View only'}</div>
                      </div>
                      {sel && <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#3C7A57" strokeWidth="2.6" strokeLinecap="round" strokeLinejoin="round"><path d="M20 6 9 17l-5-5"/></svg>}
                    </button>
                  );
                })}
              </div>
            )}
          </div>

          <button disabled={!canManage} style={{display:'flex',alignItems:'center',gap:7,background:canManage?'#1C3A2E':'#cdc3ad',color:'#F1EBDB',border:'none',borderRadius:10,padding:'10px 16px',fontFamily:'inherit',fontSize:13,fontWeight:600,cursor:canManage?'pointer':'not-allowed',boxShadow:canManage?'0 4px 12px rgba(28,58,46,.25)':'none'}}>
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#F1EBDB" strokeWidth="2.4" strokeLinecap="round"><path d="M12 5v14M5 12h14"/></svg>Invite user
          </button>
        </header>

        <main style={{flex:1,overflowY:'auto',padding:'22px 26px 48px'}}>
          <div style={{maxWidth:1180,margin:'0 auto'}}>

            {/* Permission banner */}
            {!canManage && (
              <div style={{display:'flex',alignItems:'center',gap:13,padding:'14px 18px',background:'#FBEAE2',border:'1px solid #F0B8A0',borderRadius:14,marginBottom:18}}>
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#B4502E" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style={{flexShrink:0}}><rect x="4" y="10" width="16" height="11" rx="2"/><path d="M8 10V7a4 4 0 0 1 8 0v3"/></svg>
                <div style={{flex:1}}>
                  <div style={{fontSize:13.5,fontWeight:700,color:'#B4502E'}}>You don't have permission to manage users</div>
                  <div style={{fontSize:12.5,color:'#9c5a42',marginTop:1}}>Setting passwords and billing rates is restricted to Super Admins, Stable Owners, and Managers. You can view the directory only.</div>
                </div>
              </div>
            )}
            {canManage && (
              <div style={{display:'flex',alignItems:'center',gap:12,padding:'13px 18px',background:'#fff',border:'1px solid #E8DFCC',borderRadius:14,marginBottom:18,boxShadow:'0 1px 2px rgba(40,30,15,.04)'}}>
                <div style={{width:34,height:34,borderRadius:9,background:'#E4ECE6',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#1C3A2E" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 2 4 5v6c0 5 3.4 8.5 8 10 4.6-1.5 8-5 8-10V5Z"/><path d="m9 12 2 2 4-4"/></svg>
                </div>
                <div style={{flex:1,fontSize:13,color:'#5a5345',lineHeight:1.45}}>
                  As a <b style={{color:'#23201C'}}>{ROLE[viewer].label}</b> you can set each person's first-login password and each boarder's monthly billing rate. Users choose their own password the first time they sign in.
                </div>
              </div>
            )}

            {/* Tabs */}
            <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:16}}>
              <div style={{display:'flex',background:'#fff',border:'1px solid #E4D9C0',borderRadius:11,padding:4,gap:3}}>
                {[['all','Everyone',users.length],['staff','Staff & team',users.filter(u=>!u.boarder).length],['boarders','Boarders',users.filter(u=>u.boarder).length]].map(([id,lbl,n]) => (
                  <button key={id} onClick={()=>setTab(id)} style={{display:'flex',alignItems:'center',gap:7,padding:'7px 15px',borderRadius:8,border:'none',fontFamily:'inherit',fontSize:13,fontWeight:600,cursor:'pointer',background:tab===id?'#1C3A2E':'transparent',color:tab===id?'#F1EBDB':'#7c7363',transition:'.15s'}}>
                    {lbl}<span style={{fontSize:11,fontWeight:700,padding:'1px 7px',borderRadius:20,background:tab===id?'rgba(255,255,255,.16)':'#F1EADA',color:tab===id?'#F1EBDB':'#9a9081'}}>{n}</span>
                  </button>
                ))}
              </div>
            </div>

            {/* TABLE */}
            <div style={{background:'#fff',border:'1px solid #E8DFCC',borderRadius:16,overflow:'auto',boxShadow:'0 1px 2px rgba(40,30,15,.04)'}}>
              <div style={{display:'grid',gridTemplateColumns:'minmax(200px,2.1fr) 130px 110px minmax(150px,1.5fr) 130px 150px',gap:12,padding:'12px 22px',background:'#FBF6EC',borderBottom:'1px solid #EFE6D0',fontSize:10.5,fontWeight:700,color:'#9a9081',textTransform:'uppercase',letterSpacing:.6,alignItems:'center',minWidth:920}}>
                <div>User</div><div>Role</div><div>Board rate</div><div>Password</div><div>Last sign-in</div><div style={{textAlign:'right'}}>Actions</div>
              </div>

              {filtered.map((u,i) => (
                <div key={u.id} style={{display:'grid',gridTemplateColumns:'minmax(200px,2.1fr) 130px 110px minmax(150px,1.5fr) 130px 150px',gap:12,padding:'13px 22px',borderBottom: i<filtered.length-1?'1px solid #F4EEDE':'none',alignItems:'center',minWidth:920}}>
                  {/* user */}
                  <div style={{display:'flex',alignItems:'center',gap:12,minWidth:0}}>
                    <Av name={u.name}/>
                    <div style={{minWidth:0}}>
                      <div style={{fontSize:14,fontWeight:600,color:'#2f2a23',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{u.name}</div>
                      <div style={{fontSize:11.5,color:'#8A8170',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{u.email}</div>
                    </div>
                  </div>
                  {/* role */}
                  <div><RoleChip role={u.role}/></div>
                  {/* board rate */}
                  <div>
                    {u.boarder ? (
                      canManage ? (
                        <button onClick={()=>setRateModal(u)} style={{display:'inline-flex',alignItems:'center',gap:6,background:'#FBF6EC',border:'1px solid #E4D9C0',borderRadius:9,padding:'6px 11px',cursor:'pointer',fontFamily:'inherit'}}>
                          <span style={{fontFamily:'Spectral,serif',fontSize:15,fontWeight:700,color:'#23201C'}}>${u.rate}</span>
                          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#9c7026" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>
                        </button>
                      ) : <span style={{fontFamily:'Spectral,serif',fontSize:15,fontWeight:700,color:'#23201C'}}>${u.rate}</span>
                    ) : <span style={{fontSize:13,color:'#bdb39c'}}>—</span>}
                  </div>
                  {/* password */}
                  <div><PwBadge status={u.pw}/></div>
                  {/* last login */}
                  <div style={{fontSize:12.5,color:u.last==='Never'?'#bdb39c':'#5a5345',fontWeight:u.last==='Never'?500:600}}>{u.last}</div>
                  {/* actions */}
                  <div style={{display:'flex',justifyContent:'flex-end',gap:7}}>
                    {canManage ? (
                      <>
                        {/* Edit */}
                        <button onClick={()=>setEditModal(u)} title="Edit user" style={{width:32,height:32,display:'flex',alignItems:'center',justifyContent:'center',background:'#FBF6EC',border:'1px solid #E4D9C0',borderRadius:9,cursor:'pointer',flexShrink:0}}>
                          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#9c7026" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>
                        </button>
                        {/* Password */}
                        <button onClick={()=>setPwModal(u)} style={{display:'flex',alignItems:'center',gap:6,background:u.pw==='active'?'#FBF6EC':'#1C3A2E',color:u.pw==='active'?'#5a5345':'#F1EBDB',border:u.pw==='active'?'1px solid #E4D9C0':'none',borderRadius:9,padding:'7px 11px',fontFamily:'inherit',fontSize:12,fontWeight:600,cursor:'pointer',whiteSpace:'nowrap'}}>
                          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke={u.pw==='active'?'#9c7026':'#C99A4A'} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="4" y="10" width="16" height="11" rx="2"/><path d="M8 10V7a4 4 0 0 1 8 0v3"/></svg>
                          {u.pw==='active'?'Reset':'Set password'}
                        </button>
                        {u.pw==='pending' && (
                          <button onClick={()=>setFirstLogin(u)} title="Preview first-login experience" style={{width:32,height:32,display:'flex',alignItems:'center',justifyContent:'center',background:'#EBF4FF',border:'1px solid #bcd6f7',borderRadius:9,cursor:'pointer',flexShrink:0}}>
                            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#2A6FDB" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="2.6"/></svg>
                          </button>
                        )}
                      </>
                    ) : <span style={{fontSize:12,color:'#bdb39c',fontStyle:'italic'}}>No access</span>}
                  </div>
                </div>
              ))}
            </div>

            {/* footer note */}
            <div style={{display:'flex',alignItems:'center',gap:8,marginTop:14,fontSize:12,color:'#9a9081'}}>
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#9a9081" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 16v-4M12 8h.01"/></svg>
              Passwords are never visible to admins after they're set — only whether the user has signed in and chosen their own.
            </div>
          </div>
        </main>
      </div>

      {editModal && <EditUserModal key={editModal.id} user={editModal} onClose={()=>setEditModal(null)} onSave={saveEdit}/>}
      {pwModal && <SetPasswordModal user={pwModal} onClose={()=>setPwModal(null)} onSave={savePw}/>}
      {rateModal && <RateModal user={rateModal} onClose={()=>setRateModal(null)} onSave={saveRate}/>}
      {firstLogin && <FirstLogin user={firstLogin} onClose={()=>setFirstLogin(null)} onDone={finishFirstLogin}/>}
      <Toast msg={toast}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
